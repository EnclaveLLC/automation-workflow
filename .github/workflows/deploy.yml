# -----------------------------------------------------------------------------
# Workflow: Deploy (Reusable)
# Steps:
#   1.  Fetch PR Info
#   2a. FTP deploy     ─┐ parallel (after PR Info)
#   2b. AWS deploy     ─┘
#   3a. GTmetrix check ─┐ parallel (after deploys)
#   3b. QA check       ─┘
#   4.  If QA fails → notify Slack
# -----------------------------------------------------------------------------
name: Deploy

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number that triggered this deploy"
        required: false
        type: string
      pr_title:
        description: "PR title"
        required: false
        type: string
      pr_body:
        description: "PR body"
        required: false
        type: string
    secrets:
      FTP_SERVER:
        required: false
      FTP_USERNAME:
        required: false
      FTP_PASSWORD:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      GTMETRIX_API_KEY:
        required: false
      SLACK_BOT_TOKEN:
        required: false

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Verify secrets + Fetch PR info + Extract GTmetrix & Issue URLs
  # ---------------------------------------------------------------------------
  fetching-info:
    name: Verify Secrets & Fetch PR Info
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    outputs:
      gtmetrix_url: ${{ steps.extract.outputs.gtmetrix_url }}
      issue_url: ${{ steps.extract.outputs.issue_url }}
      comment_id: ${{ steps.deploy_comment.outputs.comment_id }}
    steps:
      - name: Check secrets presence
        run: |
          echo "FTP_SERVER:            ${{ secrets.FTP_SERVER != '' && '✅ set' || '❌ missing' }}"
          echo "FTP_USERNAME:          ${{ secrets.FTP_USERNAME != '' && '✅ set' || '❌ missing' }}"
          echo "FTP_PASSWORD:          ${{ secrets.FTP_PASSWORD != '' && '✅ set' || '❌ missing' }}"
          echo "AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID != '' && '✅ set' || '❌ missing' }}"
          echo "AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY != '' && '✅ set' || '❌ missing' }}"
          echo "GTMETRIX_API_KEY:      ${{ secrets.GTMETRIX_API_KEY != '' && '✅ set' || '❌ missing' }}"
          echo "SLACK_BOT_TOKEN:       ${{ secrets.SLACK_BOT_TOKEN != '' && '✅ set' || '❌ missing' }}"

      - name: Fetch PR body if push is from a merged PR
        id: extract
        env:
          PR_BODY: ${{ inputs.pr_body }}
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR context provided — skipping."
          else
            echo "Push originated from PR #${PR_NUMBER} — ${{ inputs.pr_title }}"
            echo "-------- PR Body --------"
            echo "$PR_BODY"
            echo "-------------------------"

            GTMETRIX_URLS=$(echo "$PR_BODY" \
              | awk 'tolower($0) ~ /^### gtmetrix test urls?/{found=1; next} found && /https?:\/\//{match($0,/https?:\/\/[^ \t\r\n]+/); print substr($0,RSTART,RLENGTH)} found && !/https?:\/\// && /^##/{exit}' \
              | tr -d '\r')

            FIRST_ISSUE=$(echo "$PR_BODY" \
              | awk 'tolower($0) ~ /^### issue[[:space:]]*$/{found=1; next} found && /https?:\/\//{match($0,/https?:\/\/[^ \t\r\n]+/); print substr($0,RSTART,RLENGTH); exit}' \
              | tr -d '\r')

            if [ -n "$GTMETRIX_URLS" ]; then
              echo "---- GTmetrix URLs ----"
              echo "$GTMETRIX_URLS"
              DELIMITER="GTMETRIX_$(openssl rand -hex 8)"
              {
                echo "gtmetrix_url<<$DELIMITER"
                echo "$GTMETRIX_URLS"
                echo "$DELIMITER"
              } >> "$GITHUB_OUTPUT"
            else
              echo "No GTmetrix URLs found in PR body."
            fi

            if [ -n "$FIRST_ISSUE" ]; then
              echo "----- Issue URL ------"
              echo "$FIRST_ISSUE"
              echo "issue_url=${FIRST_ISSUE}" >> "$GITHUB_OUTPUT"
            else
              echo "No issue URL found in PR body."
            fi
            echo "-------------------------"
          fi

      - name: Comment deploy in progress on issue
        id: deploy_comment
        if: steps.extract.outputs.issue_url != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER=$(echo "${{ steps.extract.outputs.issue_url }}" | grep -oE '[0-9]+$')
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            -X POST \
            -f body="<img src=\"https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/loading.svg\" width=\"20\" height=\"20\"/> Deployment in Progress" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 2a: Deploy via FTP (runs after PR Info)
  # ---------------------------------------------------------------------------
  deploy-ftp:
    name: FTP Deploy
    needs: fetching-info
    uses: ./.github/workflows/ftp_deploy.yml
    permissions:
      contents: write
    secrets:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

  # ---------------------------------------------------------------------------
  # Job 2b: Deploy to AWS (runs in parallel with deploy-ftp)
  # ---------------------------------------------------------------------------
  deploy-aws:
    name: AWS Deploy
    needs: fetching-info
    uses: ./.github/workflows/aws_deploy.yml
    permissions:
      contents: write
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Job 3: Notify deploy complete
  # ---------------------------------------------------------------------------
  notify-deploy-complete:
    name: Notify Deploy Complete
    needs: [fetching-info, deploy-ftp, deploy-aws]
    if: |
      !cancelled() &&
      needs.fetching-info.outputs.comment_id != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Update issue comment with deploy status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ needs.fetching-info.outputs.comment_id }}
          FTP_RESULT: ${{ needs.deploy-ftp.result }}
          AWS_RESULT: ${{ needs.deploy-aws.result }}
        run: |
          if [ "$FTP_RESULT" = "success" ]; then
            FTP_STATUS="✅ FTP Deploy"
          elif [ "$FTP_RESULT" = "skipped" ]; then
            FTP_STATUS="⏭️ FTP Deploy (skipped)"
          else
            FTP_STATUS="❌ FTP Deploy"
          fi

          if [ "$AWS_RESULT" = "success" ]; then
            AWS_STATUS="✅ AWS Deploy"
          elif [ "$AWS_RESULT" = "skipped" ]; then
            AWS_STATUS="⏭️ AWS Deploy (skipped)"
          else
            AWS_STATUS="❌ AWS Deploy"
          fi

          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### Deployment completed\n\n%s\n%s' "$FTP_STATUS" "$AWS_STATUS")"

  # ---------------------------------------------------------------------------
  # Job 4a: GTmetrix performance check (runs after deploys)
  # ---------------------------------------------------------------------------
  gtmetrix:
    name: GTmetrix Check
    needs: [fetching-info, deploy-ftp, deploy-aws]
    if: needs.fetching-info.outputs.gtmetrix_url != '' && needs.fetching-info.outputs.issue_url != ''
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: read
      id-token: write
    uses: ./.github/workflows/gtmetrix.yml
    with:
      gtmetrix_url: ${{ needs.fetching-info.outputs.gtmetrix_url }}
      issue_url: ${{ needs.fetching-info.outputs.issue_url }}
    secrets:
      GTMETRIX_API_KEY: ${{ secrets.GTMETRIX_API_KEY }}

  # ---------------------------------------------------------------------------
  # Job 3b: QA Validation (runs after deploys)
  # ---------------------------------------------------------------------------
  qa-check:
    name: QA Validation
    needs: [fetching-info, deploy-ftp, deploy-aws]
    if: needs.fetching-info.outputs.issue_url != ''
    uses: ./.github/workflows/qa_check.yml
    with:
      issue_url: ${{ needs.fetching-info.outputs.issue_url }}
    permissions:
      contents: read
      issues: write