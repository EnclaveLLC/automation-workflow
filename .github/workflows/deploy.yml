# -----------------------------------------------------------------------------
# Workflow: Deploy (Reusable)
# Steps:
#   1.  Verify Secrets & Fetch PR Info
#   2a. FTP deploy     ─┐ parallel (after PR Info)
#   2b. AWS deploy     ─┘
#   3a. GTmetrix check ─┐ parallel (after deploys)
#   3b. QA check       ─┘
#   4.  If QA fails → notify Slack
# -----------------------------------------------------------------------------
name: Deploy

on:
  workflow_call:
    secrets:
      FTP_SERVER:
        required: false
      FTP_USERNAME:
        required: false
      FTP_PASSWORD:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      GTMETRIX_API_KEY:
        required: false
      SLACK_BOT_TOKEN:
        required: false

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Verify secrets + Fetch PR info + Extract GTmetrix & Issue URLs
  # ---------------------------------------------------------------------------
  fetching-info:
    name: Verify Secrets & Fetch PR Info
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gtmetrix_url: ${{ steps.extract.outputs.gtmetrix_url }}
      issue_url: ${{ steps.extract.outputs.issue_url }}
    steps:
      - name: Check secrets presence
        run: |
          echo "FTP_SERVER:            ${{ secrets.FTP_SERVER != '' && '✅ set' || '❌ missing' }}"
          echo "FTP_USERNAME:          ${{ secrets.FTP_USERNAME != '' && '✅ set' || '❌ missing' }}"
          echo "FTP_PASSWORD:          ${{ secrets.FTP_PASSWORD != '' && '✅ set' || '❌ missing' }}"
          echo "AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID != '' && '✅ set' || '❌ missing' }}"
          echo "AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY != '' && '✅ set' || '❌ missing' }}"
          echo "GTMETRIX_API_KEY:      ${{ secrets.GTMETRIX_API_KEY != '' && '✅ set' || '❌ missing' }}"
          echo "SLACK_BOT_TOKEN:       ${{ secrets.SLACK_BOT_TOKEN != '' && '✅ set' || '❌ missing' }}"

      - name: Fetch PR body if push is from a merged PR
        id: extract
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_DATA=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0] // empty')

          if [ -z "$PR_DATA" ]; then
            echo "This push was not associated with a pull request."
          else
            PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
            PR_BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
            echo "Push originated from PR #${PR_NUMBER}"
            echo "-------- PR Body --------"
            echo "$PR_BODY"
            echo "-------------------------"

            GTMETRIX_URLS=$(echo "$PR_BODY" \
              | awk 'tolower($0) ~ /^## gtmetrix test urls?/{found=1; next} found && /https?:\/\//{match($0,/https?:\/\/[^ \t\r\n]+/); print substr($0,RSTART,RLENGTH)} found && !/https?:\/\// && /^##/{exit}' \
              | tr -d '\r')

            FIRST_ISSUE=$(echo "$PR_BODY" \
              | awk 'tolower($0) ~ /^## issue[[:space:]]*$/{found=1; next} found && /https?:\/\//{match($0,/https?:\/\/[^ \t\r\n]+/); print substr($0,RSTART,RLENGTH); exit}' \
              | tr -d '\r')

            if [ -n "$GTMETRIX_URLS" ]; then
              echo "---- GTmetrix URLs ----"
              echo "$GTMETRIX_URLS"
              DELIMITER="GTMETRIX_$(openssl rand -hex 8)"
              {
                echo "gtmetrix_url<<$DELIMITER"
                echo "$GTMETRIX_URLS"
                echo "$DELIMITER"
              } >> "$GITHUB_OUTPUT"
            else
              echo "No GTmetrix URLs found in PR body."
            fi

            if [ -n "$FIRST_ISSUE" ]; then
              echo "----- Issue URL ------"
              echo "$FIRST_ISSUE"
              echo "issue_url=${FIRST_ISSUE}" >> "$GITHUB_OUTPUT"
            else
              echo "No issue URL found in PR body."
            fi
            echo "-------------------------"
          fi

  check-changes:
    name: Check File Changes
    runs-on: ubuntu-latest
    outputs:
      has_changes_for_ftp: ${{ steps.check.outputs.has_changes_for_ftp }}
      has_changes_for_aws: ${{ steps.check.outputs.has_changes_for_aws }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect changed file types
        id: check
        run: |
          FTP_CHANGED=$(git diff --name-only --diff-filter=AMD ${{ github.event.before }} ${{ github.sha }} \
            | grep -E '\.(html|php|css|js|htaccess|txt)$' || true)

          AWS_CHANGED=$(git diff --name-only --diff-filter=AMD ${{ github.event.before }} ${{ github.sha }} \
            | grep -E '\.(png|jpg|jpeg|webp)$' || true)

          if [ -n "$FTP_CHANGED" ]; then
            echo "✅ FTP files detected:"
            echo "$FTP_CHANGED"
            echo "has_changes_for_ftp=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No FTP files changed."
            echo "has_changes_for_ftp=false" >> $GITHUB_OUTPUT
          fi

          if [ -n "$AWS_CHANGED" ]; then
            echo "✅ Image files detected:"
            echo "$AWS_CHANGED"
            echo "has_changes_for_aws=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No image files changed."
            echo "has_changes_for_aws=false" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Job 2a: Deploy via FTP (runs after PR Info)
  # ---------------------------------------------------------------------------
  deploy-ftp:
    name: FTP Deploy
    needs: [fetching-info, check-changes]
    if: needs.check-changes.outputs.has_changes_for_ftp == 'true'
    uses: ./.github/workflows/ftp_deploy.yml
    permissions:
      contents: write
    secrets:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

  # ---------------------------------------------------------------------------
  # Job 2b: Deploy to AWS (runs in parallel with deploy-ftp)
  # ---------------------------------------------------------------------------
  deploy-aws:
    name: AWS Deploy
    needs: [fetching-info, check-changes]
    if: needs.check-changes.outputs.has_changes_for_aws == 'true'
    uses: ./.github/workflows/aws_deploy.yml
    permissions:
      contents: write
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Job 3a: GTmetrix performance check (runs after deploys)
  # ---------------------------------------------------------------------------
  gtmetrix:
    name: GTmetrix Check
    needs: [fetching-info, deploy-ftp, deploy-aws]
    if: needs.fetching-info.outputs.gtmetrix_url != '' && needs.fetching-info.outputs.issue_url != ''
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: read
      id-token: write
    uses: ./.github/workflows/gtmetrix.yml
    with:
      gtmetrix_url: ${{ needs.fetching-info.outputs.gtmetrix_url }}
      issue_url: ${{ needs.fetching-info.outputs.issue_url }}
    secrets:
      GTMETRIX_API_KEY: ${{ secrets.GTMETRIX_API_KEY }}

  # ---------------------------------------------------------------------------
  # Job 3b: QA Validation (runs after deploys)
  # ---------------------------------------------------------------------------
  qa-check:
    name: QA Validation
    needs: [fetching-info, deploy-ftp, deploy-aws]
    uses: ./.github/workflows/qa_check.yml
    with:
      issue_url: ${{ needs.fetching-info.outputs.issue_url }}
    permissions:
      contents: read
      issues: write

  # ---------------------------------------------------------------------------
  # Job 5: Notify Slack if QA failed
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify Slack on Failure
    needs: qa-check
    if: needs.qa-check.outputs.qa_passed == 'false'
    uses: ./.github/workflows/slack.yml
    permissions:
      contents: write
    with:
      message: ${{ needs.qa-check.outputs.failure_message }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
