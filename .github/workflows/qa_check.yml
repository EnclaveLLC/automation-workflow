# -----------------------------------------------------------------------------
# Workflow: QA Validation (reusable)
# Checks:
#   1. Images < 1MB
#   2. Valid web file extensions
#   3. No duplicate filenames
# Outputs: qa_passed, failure_message
# -----------------------------------------------------------------------------
name: QA Check

on:
  workflow_call:
    inputs:
      issue_url:
        description: "GitHub issue URL to comment QA results on"
        required: false
        type: string
    outputs:
      qa_passed:
        description: "'true' if all checks passed, 'false' otherwise"
        value: ${{ jobs.qa-check.outputs.qa_passed }}
      failure_message:
        description: "Summary of which checks failed"
        value: ${{ jobs.qa-check.outputs.failure_message }}

jobs:
  qa-check:
    name: QA Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    outputs:
      qa_passed:       ${{ steps.qa.outputs.qa_passed }}
      failure_message: ${{ steps.qa.outputs.failure_message }}

    steps:
      - name: Comment QA Checks in progress
        if: inputs.issue_url != ''
        id: progress_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(echo "${{ inputs.issue_url }}" | grep -oE '[0-9]+$')
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            -X POST \
            -f body="🔄 QA checks are now in progress..." \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Run QA checks
        id: qa
        run: |
          # Pull latest so AFTER includes any bot commits (e.g. WebP conversion from aws_deploy)
          git pull origin ${{ github.ref_name }} --no-rebase --quiet

          BEFORE="${{ github.event.before }}"
          AFTER=$(git rev-parse HEAD)

          echo "$BEFORE"

          # Get all files touched between original push base and current HEAD
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-tree -r --name-only "$AFTER")
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=AMD --no-renames "$BEFORE" "$AFTER")
          fi

          # Extract unique parent folders from changed files
          FOLDERS=$(echo "$CHANGED_FILES" | while IFS= read -r f; do
            [ -n "$f" ] && dirname "$f"
          done | sort -u)

          echo "Affected folders:"
          echo "$FOLDERS"
          echo "---"

          # Collect all existing files from every affected folder
          CHANGED=$(echo "$FOLDERS" | while IFS= read -r folder; do
            [ -z "$folder" ] && continue
            if [ "$folder" = "." ]; then
              find "." -maxdepth 1 -type f | sed 's|^\./||'
            elif [ -d "$folder" ]; then
              find "$folder" -type f
            fi
          done | sort -u)

          echo "Files to validate:"
          echo "$CHANGED"
          echo "---"

          QA_PASSED=true
          FAILURES=""

          IMAGE_EXTS="jpg jpeg png gif webp svg ico avif bmp tiff"
          WEB_EXTS="html htm php css js ts json xml txt md scss less htaccess map yaml yml mp4"

          # ------------------------------------------------------------------
          # Check 1: Every image file must be smaller than 1MB
          # ------------------------------------------------------------------
          CHECK1_FAILED=false
          CHECK1_FILES=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            ext="${file##*.}"
            ext="${ext,,}"

            is_image=false
            for img_ext in $IMAGE_EXTS; do
              [ "$ext" = "$img_ext" ] && is_image=true && break
            done

            if [ "$is_image" = true ]; then
              size=$(stat -c%s "$file")
              if [ "$size" -ge 1048576 ]; then
                CHECK1_FAILED=true
                QA_PASSED=false
                CHECK1_FILES="${CHECK1_FILES}- ${file#./}\n"
              fi
            fi
          done <<< "$CHANGED"
          [ "$CHECK1_FAILED" = true ] && FAILURES="${FAILURES}Check 1: Image size exceeded 1MB\n${CHECK1_FILES}\n"

          # ------------------------------------------------------------------
          # Check 2: Every web file must have a recognized extension
          # ------------------------------------------------------------------
          CHECK2_FAILED=false
          CHECK2_FILES=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            base=$(basename "$file")
            [[ "$base" == .* ]] && continue
            [[ "$base" != *.* ]] && continue

            ext="${base##*.}"
            ext="${ext,,}"

            is_valid=false
            for valid_ext in $IMAGE_EXTS $WEB_EXTS; do
              [ "$ext" = "$valid_ext" ] && is_valid=true && break
            done

            if [ "$is_valid" = false ]; then
              CHECK2_FAILED=true
              QA_PASSED=false
              CHECK2_FILES="${CHECK2_FILES}- ${file#./}\n"
            fi
          done <<< "$CHANGED"
          [ "$CHECK2_FAILED" = true ] && FAILURES="${FAILURES}Check 2: Unrecognized file extension\n${CHECK2_FILES}\n"

          # ------------------------------------------------------------------
          # Emit outputs
          # ------------------------------------------------------------------
          PASSED_CHECKS=""
          [ "$CHECK1_FAILED" = false ] && PASSED_CHECKS="${PASSED_CHECKS}✅ Image File Size\n"
          [ "$CHECK2_FAILED" = false ] && PASSED_CHECKS="${PASSED_CHECKS}✅ Web File Extension\n"

          if [ "$QA_PASSED" = "true" ]; then
            echo "✅ All QA checks passed"
            echo "qa_passed=true"   >> "$GITHUB_OUTPUT"
            echo "failure_message=" >> "$GITHUB_OUTPUT"
          else
            echo "❌ QA checks failed:"
            printf '%b' "$FAILURES"
            echo "qa_passed=false" >> "$GITHUB_OUTPUT"
            {
              echo 'failure_message<<EOF'
              printf '%b' "$FAILURES"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'passed_checks<<EOF'
            printf '%b' "$PASSED_CHECKS"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Comment QA result on issue
        if: inputs.issue_url != '' && steps.progress_comment.outputs.comment_id != ''
        env:
          GH_TOKEN:   ${{ github.token }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
          QA_PASSED:       ${{ steps.qa.outputs.qa_passed }}
          PASSED_CHECKS:   ${{ steps.qa.outputs.passed_checks }}
          FAILURE_MESSAGE: ${{ steps.qa.outputs.failure_message }}
        run: |
          if [ "$QA_PASSED" = "true" ]; then
            BODY=$(printf '### ✅ QA Checks Passed\n\n%s' "$PASSED_CHECKS")
          else
            BODY=$(printf '### ❌ QA Checks Failed\n\n**Passed:**\n%s\n**Failed:**\n%s' "$PASSED_CHECKS" "$FAILURE_MESSAGE")
          fi

          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$BODY"
