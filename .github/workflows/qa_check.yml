# -----------------------------------------------------------------------------
# Workflow: QA Validation (reusable)
# Checks:
#   1. Images < 1MB
#   2. Valid web file extensions
#   3. No duplicate filenames
# Outputs: qa_passed, failure_message
# -----------------------------------------------------------------------------
name: QA Check

on:
  workflow_call:
    outputs:
      qa_passed:
        description: "'true' if all checks passed, 'false' otherwise"
        value: ${{ jobs.qa-check.outputs.qa_passed }}
      failure_message:
        description: "Summary of which checks failed"
        value: ${{ jobs.qa-check.outputs.failure_message }}

jobs: 
  qa-check:
    name: QA Validation
    runs-on: ubuntu-latest
    outputs:
      qa_passed:       ${{ steps.qa.outputs.qa_passed }}
      failure_message: ${{ steps.qa.outputs.failure_message }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Run QA checks
        id: qa
        run: |
          # Pull latest so AFTER includes any bot commits (e.g. WebP conversion from aws_deploy)
          git pull origin ${{ github.ref_name }} --no-rebase --quiet

          BEFORE="${{ github.event.before }}"
          AFTER=$(git rev-parse HEAD)

          # Get all files touched between original push base and current HEAD
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-tree -r --name-only "$AFTER")
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=AMD "$BEFORE" "$AFTER")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo "---"

          # Extract unique parent folders from changed files
          FOLDERS=$(echo "$CHANGED_FILES" | xargs -I{} dirname {} | sort -u)

          echo "Affected folders:"
          echo "$FOLDERS"
          echo "---"

          # Expand each affected folder to all current files inside it
          CHANGED=""
          while IFS= read -r folder; do
            [ -z "$folder" ] && continue
            if [ "$folder" = "." ]; then
              FILES=$(find "." -maxdepth 1 -type f | sed 's|^\./||')
            else
              [ ! -d "$folder" ] && continue
              FILES=$(find "$folder" -type f | sed 's|^\./||')
            fi
            CHANGED=$(printf '%s\n%s' "$CHANGED" "$FILES")
          done <<< "$FOLDERS"

          CHANGED=$(echo "$CHANGED" | grep -v '^$' | sort -u)

          echo "Files to validate:"
          echo "$CHANGED"
          echo "---"

          QA_PASSED=true
          FAILURES=""

          IMAGE_EXTS="jpg jpeg png gif webp svg ico avif bmp tiff"
          WEB_EXTS="html htm php css js ts json xml txt md scss less htaccess map yaml yml mp4"

          # ------------------------------------------------------------------
          # Check 1: Every image file must be smaller than 1MB
          # ------------------------------------------------------------------
          CHECK1_FAILED=false
          CHECK1_FILES=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            ext="${file##*.}"
            ext="${ext,,}"

            is_image=false
            for img_ext in $IMAGE_EXTS; do
              [ "$ext" = "$img_ext" ] && is_image=true && break
            done

            if [ "$is_image" = true ]; then
              size=$(stat -c%s "$file")
              if [ "$size" -ge 1048576 ]; then
                CHECK1_FAILED=true
                QA_PASSED=false
                CHECK1_FILES="${CHECK1_FILES}${file#./}, "
              fi
            fi
          done <<< "$CHANGED"
          [ "$CHECK1_FAILED" = true ] && FAILURES="${FAILURES}Check 1: Image size exceeded 1MB — ${CHECK1_FILES%, }\n"

          # ------------------------------------------------------------------
          # Check 2: Every web file must have a recognized extension
          # ------------------------------------------------------------------
          CHECK2_FAILED=false
          CHECK2_FILES=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            base=$(basename "$file")
            [[ "$base" == .* ]] && continue
            [[ "$base" != *.* ]] && continue

            ext="${base##*.}"
            ext="${ext,,}"

            is_valid=false
            for valid_ext in $IMAGE_EXTS $WEB_EXTS; do
              [ "$ext" = "$valid_ext" ] && is_valid=true && break
            done

            if [ "$is_valid" = false ]; then
              CHECK2_FAILED=true
              QA_PASSED=false
              CHECK2_FILES="${CHECK2_FILES}${file#./}, "
            fi
          done <<< "$CHANGED"
          [ "$CHECK2_FAILED" = true ] && FAILURES="${FAILURES}Check 2: Unrecognized file extension — ${CHECK2_FILES%, }\n"

          # ------------------------------------------------------------------
          # Emit outputs
          # ------------------------------------------------------------------
          if [ "$QA_PASSED" = "true" ]; then
            echo "✅ All QA checks passed"
            echo "qa_passed=true"   >> "$GITHUB_OUTPUT"
            echo "failure_message=" >> "$GITHUB_OUTPUT"
          else
            echo "❌ QA checks failed:"
            printf "$FAILURES"
            echo "qa_passed=false" >> "$GITHUB_OUTPUT"
            {
              echo 'failure_message<<EOF'
              printf "$FAILURES"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi
