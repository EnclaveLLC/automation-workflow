name: Page Update

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number that triggered this workflow"
        required: true
        type: number

jobs:
  # ── Job 1: Parse issue body ─────────────────────────────────────────────────
  parse-issue:
    name: Parse Issue Body
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      page_url:        ${{ steps.parse.outputs.page_url }}
      page_path:       ${{ steps.parse.outputs.page_path }}
      linear_id:       ${{ steps.parse.outputs.linear_id }}
      comment_id:      ${{ steps.progress_comment.outputs.comment_id }}
      comment_updated: ${{ steps.parse.outputs.comment_updated }}

    steps:
      - name: Comment page update in progress
        id: progress_comment
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            -X POST \
            -f body="<img src=\"https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-loading.svg\" width=\"20\" height=\"20\" data-linear-height=\"20\"/> Page update in progress" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Parse issue body
        id: parse
        run: |
          ISSUE_BODY=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }} --jq '.body')
          export ISSUE_BODY

          # Ignore "Dev Notes" and anything after it; stop at ] to avoid capturing link targets
          PAGE_URL=$(node -e "
            const body = process.env.ISSUE_BODY.split(/\nDev Notes/i)[0];
            const m = body.match(/https?:\/\/[^\]\s>)]+/);
            if (!m) { process.stderr.write('No URL found\n'); process.exit(1); }
            process.stdout.write(m[0]);
          " 2>/dev/null || true)

          if [ -z "$PAGE_URL" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments --jq '.[-1].id') \
              -X PATCH \
              -f body="$(printf '### Page Update Failed\n\nNo URL found in the issue body.\n\nPlease follow the issue format and include a valid page URL.')"
            echo "comment_updated=true" >> "$GITHUB_OUTPUT"
            echo "ERROR: No URL found in issue body"
            exit 1
          fi

          # Use Node URL API to reliably strip domain → pathname only
          PAGE_PATH=$(PAGE_URL="$PAGE_URL" node -e "
            const url = new URL(process.env.PAGE_URL);
            process.stdout.write(url.pathname.replace(/^\//, ''));
          ")

          echo "page_url=$PAGE_URL"   >> "$GITHUB_OUTPUT"
          echo "page_path=$PAGE_PATH" >> "$GITHUB_OUTPUT"
          echo "Parsed URL:  $PAGE_URL"
          echo "Parsed path: $PAGE_PATH"

          LINEAR_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            --jq '[.[] | select(.user.login | test("linear"; "i")) | .body | match("[A-Z]+-[0-9]+").string] | first // ""' \
            2>/dev/null || echo "")
          if [ -n "$LINEAR_ID" ]; then
            echo "linear_id=$LINEAR_ID" >> "$GITHUB_OUTPUT"
            echo "linear_id: $LINEAR_ID"
          fi

  # ── Job 2: Check path already exists ────────────────────────────────────────
  check-path:
    name: Check Path Availability
    needs: parse-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN:   ${{ github.token }}
      PAGE_PATH:  ${{ needs.parse-issue.outputs.page_path }}
      COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
    outputs:
      comment_updated: ${{ steps.check_exists.outputs.comment_updated }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Check page already exists
        id: check_exists
        run: |
          set -euo pipefail
          CLEAN_PATH="${PAGE_PATH#/}"
          if [ ! -e "$CLEAN_PATH" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### Page Update Failed\n\nThe following path does not exist in the repository:\n\n❌ %s\n\nPlease check the page URL and try again.' "$CLEAN_PATH")"
            echo "comment_updated=true" >> "$GITHUB_OUTPUT"
            echo "ERROR: '$CLEAN_PATH' does not exist."
            exit 1
          fi
          echo "✅ Path '$CLEAN_PATH' exists."

  # ── Job 3: Create update branch ─────────────────────────────────────────────
  create-branch:
    name: Create Update Branch
    needs: [parse-issue, check-path]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      GH_TOKEN:   ${{ github.token }}
      PAGE_PATH:  ${{ needs.parse-issue.outputs.page_path }}
      PAGE_URL:   ${{ needs.parse-issue.outputs.page_url }}
      LINEAR_ID:  ${{ needs.parse-issue.outputs.linear_id }}
      COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
    outputs:
      comment_updated: ${{ steps.verify_branch.outputs.comment_updated }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Set branch name
        run: |
          PAGE_SLUG=$(basename "${PAGE_PATH%/}")
          if [ -n "$LINEAR_ID" ]; then
            echo "BRANCH_NAME=page-update/${LINEAR_ID}-${PAGE_SLUG}" >> "$GITHUB_ENV"
          else
            echo "BRANCH_NAME=page-update/${PAGE_SLUG}" >> "$GITHUB_ENV"
          fi

      - name: Check for existing branch
        id: verify_branch
        run: |
          set -euo pipefail
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "refs/heads/${BRANCH_NAME}"; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Branch '$BRANCH_NAME' already exists — task already completed, skipping."
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ Branch '$BRANCH_NAME' is available."
          fi

      - name: Create branch
        if: steps.verify_branch.outputs.already_exists != 'true'
        run: |
          set -euo pipefail
          git checkout -b "$BRANCH_NAME"

      - name: Push branch
        if: steps.verify_branch.outputs.already_exists != 'true'
        run: |
          set -euo pipefail
          git push -u origin "$BRANCH_NAME"

      - name: Comment branch link on issue
        env:
          ALREADY_EXISTS: ${{ steps.verify_branch.outputs.already_exists }}
        run: |
          set -euo pipefail
          BRANCH_URL="https://github.com/${{ github.repository }}/tree/${BRANCH_NAME}"

          if [ "$ALREADY_EXISTS" = "true" ]; then
            cat > /tmp/issue_comment.md << CMEOF
          The branch already exists. Delete the existing branch first before creating a new one. Skipping branch creation.

          ${BRANCH_URL}
          CMEOF
          else
            cat > /tmp/issue_comment.md << CMEOF
          ### Summary:
          - Branch created

          The update branch is ready. Comment \`/pr\` on this issue to generate a pull request:
          ${BRANCH_URL}
          CMEOF
          fi

          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(cat /tmp/issue_comment.md)"

  # ── Job: Update comment on any failure ─────────────────────────────────────
  handle-failure:
    name: Handle Failure
    needs: [parse-issue, check-path, create-branch]
    runs-on: ubuntu-latest
    if: >-
      failure() &&
      needs.parse-issue.outputs.comment_updated != 'true' &&
      needs.check-path.outputs.comment_updated != 'true' &&
      needs.create-branch.outputs.comment_updated != 'true'
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Update comment with failure message
        env:
          COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          if [ -z "$COMMENT_ID" ]; then
            echo "No comment ID available, skipping"
            exit 0
          fi
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### Page Update Failed\n\nAn error occurred. Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.')"
