name: Split Test

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number that triggered this workflow"
        required: true
        type: number
      type:
        description: "Split test action ('on' or 'off')"
        required: true
        type: string
    secrets:
      NOTION_TOKEN:
        required: false

jobs:
  # ── Job 1: Parse issue body ─────────────────────────────────────────────────
  parse-issue:
    name: Parse Issue Body
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      control_url:  ${{ steps.parse.outputs.control_url }}
      control_path: ${{ steps.parse.outputs.control_path }}
      variations:   ${{ steps.parse.outputs.variations }}
      comment_id:   ${{ steps.progress_comment.outputs.comment_id }}
      linear_id:    ${{ steps.parse.outputs.linear_id }}

    steps:
      - name: Comment split test in progress
        id: progress_comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            -X POST \
            -f body="<img src=\"https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-loading.svg\" width=\"20\" height=\"20\" data-linear-height=\"20\"/> ${{ inputs.type == 'on' && 'Enabling' || 'Disabling' }} split test in progress" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ github.token }}

      - name: Parse issue body
        id: parse
        run: |
          ISSUE_BODY=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }} --jq '.body')
          export ISSUE_BODY
          node EnclaveLLC/automation-workflow/scripts/split_test/parse_issue.js

          LINEAR_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            --jq '[.[] | select(.user.login | test("linear"; "i")) | .body | match("[A-Z]+-[0-9]+").string] | first // ""' \
            2>/dev/null || echo "")
          if [ -n "$LINEAR_ID" ]; then
            echo "linear_id=$LINEAR_ID" >> "$GITHUB_OUTPUT"
            echo "linear_id: $LINEAR_ID"
          fi

  # ── Job 2: Verify control and variation paths exist ─────────────────────────
  st-on-check-paths:
    if: inputs.type == 'on'
    name: Check Paths Exist
    needs: parse-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      comment_updated: ${{ steps.verify_paths.outputs.comment_updated || steps.check_no_split.outputs.comment_updated }}
    steps:
      - name: Update comment — verifying URLs
        env:
          GH_TOKEN:    ${{ github.token }}
          COMMENT_ID:  ${{ needs.parse-issue.outputs.comment_id }}
          CONTROL_URL: ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:  ${{ needs.parse-issue.outputs.variations }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body='<img src="https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-loading.svg" width="20" height="20" data-linear-height="20"/> Verifying URLs'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Verify paths exist
        id: verify_paths
        env:
          GH_TOKEN:     ${{ github.token }}
          CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
          CONTROL_URL:  ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:   ${{ needs.parse-issue.outputs.variations }}
          COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          set -euo pipefail
          MISSING=""

          CONTROL_PATH="${CONTROL_PATH#/}"
          if [ ! -e "$CONTROL_PATH" ]; then
            MISSING="${MISSING}❌ ${CONTROL_URL}\n"
          elif [ ! -f "$CONTROL_PATH/index.php" ]; then
            MISSING="${MISSING}❌ ${CONTROL_URL} (index.php not found)\n"
          else
            echo "✅ Control path exists: $CONTROL_PATH"
            echo "✅ index.php found in: $CONTROL_PATH"
          fi

          if [ "$(echo "$VARIATIONS" | jq 'length')" -gt 0 ]; then
            while IFS='|' read -r VAR_PATH VAR_URL; do
              VAR_PATH="${VAR_PATH#/}"
              if [ ! -e "$VAR_PATH" ]; then
                MISSING="${MISSING}❌ ${VAR_URL}\n"
              else
                echo "✅ Variation path exists: $VAR_PATH"
              fi
            done < <(echo "$VARIATIONS" | jq -r '.[] | "\(.path)|\(.url)"')
          else
            echo "No variations provided — skipping variation path check."
          fi

          if [ -n "$MISSING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### Split Test Validation Failed\n\nThe following issue(s) were found:\n\n'"$MISSING")"
            echo "comment_updated=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "✅ All paths verified."

      - name: Check split test code not already present
        id: check_no_split
        env:
          GH_TOKEN:     ${{ github.token }}
          CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
          CONTROL_URL:  ${{ needs.parse-issue.outputs.control_url }}
          COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          set -euo pipefail
          CONTROL_PATH="${CONTROL_PATH#/}"
          INDEX_FILE="$CONTROL_PATH/index.php"

          if grep -q "splittester.class.php" "$INDEX_FILE"; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### Split Test URL Validation Failed\n\nSplit test code already exists in:\n\n❌ %s\n\nRemove the existing split test code before enabling a new one.' "$CONTROL_URL")"
            echo "comment_updated=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "✅ No existing split test code found in $INDEX_FILE"

      - name: Update comment — validation passed
        env:
          GH_TOKEN:    ${{ github.token }}
          COMMENT_ID:  ${{ needs.parse-issue.outputs.comment_id }}
          CONTROL_URL: ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:  ${{ needs.parse-issue.outputs.variations }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body='<img src="https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-loading.svg" width="20" height="20" data-linear-height="20"/> Split test code implementation in progress'

  # ── Job: Fetch Notion domain data ────────────────────────────────────────────
  fetch-notion:
    name: Fetch Notion Data
    needs: [parse-issue]
    uses: ./.github/workflows/notion-parse.yml
    with:
      repo_name: ${{ github.event.repository.name }}
    secrets:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

  # ── Job 3: Add split test code ───────────────────────────────────────────────
  add-split-test-code:
    if: inputs.type == 'on' && needs.st-on-check-paths.result == 'success'
    name: Add Split Test Code
    needs: [parse-issue, st-on-check-paths, fetch-notion]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      GH_TOKEN:     ${{ github.token }}
      CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
      CONTROL_URL:  ${{ needs.parse-issue.outputs.control_url }}
      VARIATIONS:   ${{ needs.parse-issue.outputs.variations }}
      COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ github.token }}

      - name: Add split test code
        run: node EnclaveLLC/automation-workflow/scripts/split_test/add_split_test_code.js

      - name: Set branch name
        run: |
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-\|-$//g')
          echo "BRANCH_NAME=${SLUG}-${{ github.run_id }}" >> "$GITHUB_ENV"

      - name: Create branch
        run: |
          set -euo pipefail
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "ERROR: Branch '$BRANCH_NAME' already exists on remote."
            exit 1
          fi
          git checkout -b "$BRANCH_NAME"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          set -euo pipefail
          git add .
          git commit -m "${{ github.event.issue.title }}"

      - name: Push branch
        run: |
          set -euo pipefail
          git push -u origin "$BRANCH_NAME"

      - name: Create pull request
        id: create_pr
        env:
          GH_TOKEN:       ${{ github.token }}
          CONTROL_URL:    ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:     ${{ needs.parse-issue.outputs.variations }}
          LINEAR_ID:      ${{ needs.parse-issue.outputs.linear_id }}
          NOTION_JSON:    ${{ needs.fetch-notion.outputs.notion_json }}
          REPO:           ${{ github.repository }}
          ISSUE_NUMBER:   ${{ inputs.issue_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          node - << 'SCRIPT'
          const fs   = require('fs');
          const repo = process.env.REPO;
          const num  = process.env.ISSUE_NUMBER;

          const controlUrl = process.env.CONTROL_URL || '';
          const variationsRaw = process.env.VARIATIONS || '';
          let variationUrls = '';
          try {
            const vars = JSON.parse(variationsRaw);
            variationUrls = vars.map(v => v.url).join('\n');
          } catch (e) {}

          const raw = process.env.NOTION_JSON || '';
          console.log(`[debug] NOTION_JSON length=${raw.length} prefix=${raw.slice(0,80)}`);
          let notionSection = '';
          if (raw) {
            const n = JSON.parse(raw);
            const row = (label, val) => val && String(val).trim()
              ? `| ${label} | ${String(val).trim()} |\n` : '';
            notionSection  = '### Notion Page Data:\n\n';
            notionSection += '| Field | Value |\n|:---|:---|\n';
            notionSection += row('Domain Name',     n.domain_name);
            notionSection += row('Product',         n.product);
            notionSection += row('Type',            n.type);
            notionSection += row('Buyer / Agency',  n.buyer_agency);
            notionSection += row('GTM',             n.gtm);
            notionSection += row('Meta Pixel',      n.meta_pixel);
            notionSection += row('GDPR',            n.gdpr === true ? 'Yes' : null);
            notionSection += row('Samcart Domain',  n.samcart_domain);
            notionSection += row('1 Pack Checkout', n.checkout_1_pack);
            notionSection += row('3 Pack Checkout', n.checkout_3_pack);
            notionSection += row('6 Pack Checkout', n.checkout_6_pack);
            notionSection += row('9 Pack Checkout', n.checkout_9_pack);
            notionSection += row('Marketplace',     n.marketplace);
            notionSection += row('Google Accounts', n.google_accounts);
            notionSection += row('Taboola Pixel',   n.taboola_pixel);
            notionSection += row('TikTok Pixel',    n.tiktok_pixel);
            notionSection += row('Offer ID',        n.offer_id);
          }

          const linearId = process.env.LINEAR_ID || '';
          const body = [
            '### Summary:',
            '- Control page verified',
            '- Variations pages verified',
            '- Split test code added to control page',
            '- PR created',
            '',
            notionSection.trim(),
            '',
            '### GTMetrix Test URLs',
            controlUrl,
            variationUrls,
            '',
            '### Issue',
            `https://github.com/${repo}/issues/${num}`,
            ...(linearId ? ['', `Resolves ${linearId}`] : []),
          ].join('\n');

          fs.writeFileSync('/tmp/pr_body.md', body);
          SCRIPT

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title --jq '.title')
          PR_TITLE="$ISSUE_TITLE"

          PR_URL=$(gh pr create \
            --base  "$DEFAULT_BRANCH" \
            --head  "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body-file /tmp/pr_body.md)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"

      - name: Update comment — split test complete
        env:
          GH_TOKEN:    ${{ github.token }}
          CONTROL_URL: ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:  ${{ needs.parse-issue.outputs.variations }}
          PR_URL:      ${{ steps.create_pr.outputs.pr_url }}
          COMMENT_ID:  ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### Summary:\n- Control page verified\n- Variations pages verified\n- Split test code added to control page\n- PR created\n\nThe split test ${{ inputs.type }} is now available in PR to review:\n%s' "$PR_URL")"

  # ── Job 4: Verify control path exists before removing split test ─────────────
  st-off-check-paths:
    if: inputs.type == 'off'
    name: Check Paths Exist (Off)
    needs: parse-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      comment_updated: ${{ steps.verify_control.outputs.comment_updated || steps.check_has_split.outputs.comment_updated }}
    steps:
      - name: Update comment — verifying control URL
        env:
          COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body='<img src="https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-loading.svg" width="20" height="20" data-linear-height="20"/> Verifying URLs'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Verify control path exists
        id: verify_control
        env:
          CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
          CONTROL_URL:  ${{ needs.parse-issue.outputs.control_url }}
          COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          set -euo pipefail
          CONTROL_PATH="${CONTROL_PATH#/}"
          if [ ! -e "$CONTROL_PATH" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### Split Test Validation Failed\n\nThe following path does not exist:\n\n❌ %s' "$CONTROL_URL")"
            echo "comment_updated=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "✅ Control path exists: $CONTROL_PATH"

      - name: Check split test code is present
        id: check_has_split
        env:
          CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
          CONTROL_URL:  ${{ needs.parse-issue.outputs.control_url }}
          COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          set -euo pipefail
          CONTROL_PATH="${CONTROL_PATH#/}"
          INDEX_FILE="$CONTROL_PATH/index.php"

          if ! grep -q "splittester.class.php" "$INDEX_FILE"; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### Split Test URL Validation Failed\n\nSplit test code does not exist in:\n\n❌ %s\n\nThere is no split test code to remove.' "$CONTROL_URL")"
            echo "comment_updated=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "✅ Split test code found in $INDEX_FILE"

      - name: Update comment — validation passed
        env:
          COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body='<img src="https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-loading.svg" width="20" height="20" data-linear-height="20"/> All url'"'"'s verified, Removing split test code in progress'

  # ── Job 5: Remove split test code and create PR ──────────────────────────────
  remove-split-test-code:
    if: inputs.type == 'off' && needs.st-off-check-paths.result == 'success'
    name: Remove Split Test Code
    needs: [parse-issue, st-off-check-paths, fetch-notion]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GH_TOKEN:     ${{ github.token }}
      CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
      COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ github.token }}

      - name: Remove split test code
        run: node EnclaveLLC/automation-workflow/scripts/split_test/remove_split_test_code.js

      - name: Set branch name
        run: |
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-\|-$//g')
          echo "BRANCH_NAME=${SLUG}-${{ github.run_id }}" >> "$GITHUB_ENV"

      - name: Create branch
        run: |
          set -euo pipefail
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "ERROR: Branch '$BRANCH_NAME' already exists on remote."
            exit 1
          fi
          git checkout -b "$BRANCH_NAME"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          set -euo pipefail
          git add .
          git commit -m "${{ github.event.issue.title }}"

      - name: Push branch
        run: |
          set -euo pipefail
          git push -u origin "$BRANCH_NAME"

      - name: Create pull request
        id: create_pr
        env:
          GH_TOKEN:       ${{ github.token }}
          CONTROL_URL:    ${{ needs.parse-issue.outputs.control_url }}
          LINEAR_ID:      ${{ needs.parse-issue.outputs.linear_id }}
          NOTION_JSON:    ${{ needs.fetch-notion.outputs.notion_json }}
          REPO:           ${{ github.repository }}
          ISSUE_NUMBER:   ${{ inputs.issue_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          node - << 'SCRIPT'
          const fs   = require('fs');
          const repo = process.env.REPO;
          const num  = process.env.ISSUE_NUMBER;

          const controlUrl = process.env.CONTROL_URL || '';

          const raw = process.env.NOTION_JSON || '';
          console.log(`[debug] NOTION_JSON length=${raw.length} prefix=${raw.slice(0,80)}`);
          let notionSection = '';
          if (raw) {
            const n = JSON.parse(raw);
            const row = (label, val) => val && String(val).trim()
              ? `| ${label} | ${String(val).trim()} |\n` : '';
            notionSection  = '### Notion Page Data:\n\n';
            notionSection += '| Field | Value |\n|:---|:---|\n';
            notionSection += row('Domain Name',     n.domain_name);
            notionSection += row('Product',         n.product);
            notionSection += row('Type',            n.type);
            notionSection += row('Buyer / Agency',  n.buyer_agency);
            notionSection += row('GTM',             n.gtm);
            notionSection += row('Meta Pixel',      n.meta_pixel);
            notionSection += row('GDPR',            n.gdpr === true ? 'Yes' : null);
            notionSection += row('Samcart Domain',  n.samcart_domain);
            notionSection += row('1 Pack Checkout', n.checkout_1_pack);
            notionSection += row('3 Pack Checkout', n.checkout_3_pack);
            notionSection += row('6 Pack Checkout', n.checkout_6_pack);
            notionSection += row('9 Pack Checkout', n.checkout_9_pack);
            notionSection += row('Marketplace',     n.marketplace);
            notionSection += row('Google Accounts', n.google_accounts);
            notionSection += row('Taboola Pixel',   n.taboola_pixel);
            notionSection += row('TikTok Pixel',    n.tiktok_pixel);
            notionSection += row('Offer ID',        n.offer_id);
          }

          const linearId = process.env.LINEAR_ID || '';
          const body = [
            '### Summary:',
            '- Control page verified',
            '- Split test code removed from control page',
            '- PR created',
            '',
            notionSection.trim(),
            '',
            '### GTMetrix Test URLs',
            controlUrl,
            '',
            '### Issue',
            `https://github.com/${repo}/issues/${num}`,
            ...(linearId ? ['', `Resolves ${linearId}`] : []),
          ].join('\n');

          fs.writeFileSync('/tmp/pr_body.md', body);
          SCRIPT

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title --jq '.title')
          PR_TITLE="$ISSUE_TITLE"

          PR_URL=$(gh pr create \
            --base  "$DEFAULT_BRANCH" \
            --head  "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body-file /tmp/pr_body.md)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"

      - name: Update comment — split test complete
        env:
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### Summary:\n- Control page verified\n- Split test code removed from control page\n- PR created\n\nThe split test off is now available in PR to review:\n%s' "$PR_URL")"

  # ── Job: Update comment on any failure ─────────────────────────────────────
  handle-failure:
    name: Handle Failure
    needs: [parse-issue, fetch-notion, st-on-check-paths, add-split-test-code, st-off-check-paths, remove-split-test-code]
    runs-on: ubuntu-latest
    if: >-
      failure() &&
      needs.st-on-check-paths.outputs.comment_updated != 'true' &&
      needs.st-off-check-paths.outputs.comment_updated != 'true'
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Update comment with failure message
        env:
          COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          if [ -z "$COMMENT_ID" ]; then
            echo "No comment ID available, skipping"
            exit 0
          fi
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### Split Test Failed\n\nAn error occurred. Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.')"
