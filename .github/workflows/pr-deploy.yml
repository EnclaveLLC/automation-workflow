# -----------------------------------------------------------------------------
# Workflow: PR Deploy (Reusable)
# Triggered on merged PRs. Full pipeline:
#   1.  Fetch PR Info + post initial status comment
#   2a. FTP deploy     ─┐ parallel (after PR Info)
#   2b. AWS deploy     ─┘  each updates its own comment row on finish/skip
#   3.  Pre QA check       (after deploys — marks Deployment row completed)
#   4.  GTmetrix check     (after Pre QA)
# -----------------------------------------------------------------------------
name: PR Deploy

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number that triggered this deploy"
        required: false
        type: string
      pr_title:
        description: "PR title"
        required: false
        type: string
      pr_body:
        description: "PR body"
        required: false
        type: string
      badge_completed:
        description: "Image URL for the completed status badge"
        required: false
        type: string
        default: "https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-completed.svg"
      badge_aborted:
        description: "Image URL for the aborted status badge"
        required: false
        type: string
        default: "https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-aborted.svg"
      badge_in_progress:
        description: "Image URL for the in-progress status badge"
        required: false
        type: string
        default: "https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-in-progress.svg"
      badge_waiting:
        description: "Image URL for the waiting status badge"
        required: false
        type: string
        default: "https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-waiting.svg"
      badge_passed:
        description: "Image URL for the passed status badge"
        required: false
        type: string
        default: "https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-passed.svg"
      badge_failed:
        description: "Image URL for the failed status badge"
        required: false
        type: string
        default: "https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-failed.svg"
    secrets:
      FTP_SERVER:
        required: false
      FTP_USERNAME:
        required: false
      FTP_PASSWORD:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      GTMETRIX_API_KEY:
        required: false
jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Verify secrets + Fetch PR info + Extract GTmetrix & Issue URLs
  # ---------------------------------------------------------------------------
  fetching-info:
    name: Verify Secrets & Fetch PR Info
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    outputs:
      gtmetrix_url: ${{ steps.extract.outputs.gtmetrix_url }}
      issue_url: ${{ steps.extract.outputs.issue_url }}
      comment_id: ${{ steps.deploy_comment.outputs.comment_id }}
    steps:
      - name: Post initial workflow status comment
        id: deploy_comment
        env:
          PR_BODY:           ${{ inputs.pr_body }}
          PR_TITLE:          ${{ inputs.pr_title }}
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN:          ${{ github.token }}
          BADGE_COMPLETED:   ${{ inputs.badge_completed }}
          BADGE_ABORTED:     ${{ inputs.badge_aborted }}
          BADGE_IN_PROGRESS: ${{ inputs.badge_in_progress }}
          BADGE_WAITING:     ${{ inputs.badge_waiting }}
        run: |
          ISSUE_URL=$(echo "$PR_BODY" \
            | awk 'tolower($0) ~ /^### issue[[:space:]]*$/{found=1; next} found && /https?:\/\//{match($0,/https?:\/\/[^ \t\r\n]+/); print substr($0,RSTART,RLENGTH); exit}' \
            | tr -d '\r')
          [ -z "$ISSUE_URL" ] && exit 0
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')

          cat > /tmp/initial_comment.js << 'SCRIPT'
          const title = process.env.PR_TITLE || '';
          const badges = {
            completed:  process.env.BADGE_COMPLETED,
            aborted:    process.env.BADGE_ABORTED,
            inProgress: process.env.BADGE_IN_PROGRESS,
            waiting:    process.env.BADGE_WAITING,
          };
          const lines = [
            '## Standard Workflow: ' + title + ' In-Progress',
            '',
            '_This status summary may not reflect the most recent progress._',
            '_For real-time updates, logs, and step details, visit: [GitHub Actions](' + process.env.RUN_URL + ')_',
            '',
            '<!-- linear:table-colwidths:215,154 -->',
            '| Step | Status |',
            '|:---|:---|',
            `| Verify Secrets | <img src="${badges.inProgress}" width="120" data-linear-height="20"> |`,
            `| Deployment | <img src="${badges.waiting}" width="120" data-linear-height="20"> |`,
            `| Pre Quality Assurance | <img src="${badges.waiting}" width="120" data-linear-height="20"> |`,
            `| Post Quality Assurance | <img src="${badges.waiting}" width="120" data-linear-height="20"> |`,
            `| GT Metrix Test | <img src="${badges.waiting}" width="120" data-linear-height="20"> |`,
            '',
            '<!-- deployment-details -->',
            '<!-- /deployment-details -->',
            '<!-- qa-details -->',
            '<!-- /qa-details -->',
            '<!-- post-qa-details -->',
            '<!-- /post-qa-details -->',
            '<!-- gtmetrix-details -->',
            '<!-- /gtmetrix-details -->',
          ];
          process.stdout.write(lines.join('\n'));
          SCRIPT

          BODY=$(node /tmp/initial_comment.js)
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            -X POST \
            -f body="$BODY" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Verifying Secrets
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ steps.deploy_comment.outputs.comment_id }}
          BADGE_COMPLETED: ${{ inputs.badge_completed }}
          BADGE_IN_PROGRESS: ${{ inputs.badge_in_progress }}
        run: |
          echo "FTP_SERVER:            ${{ secrets.FTP_SERVER != '' && '✅ set' || '❌ missing' }}"
          echo "FTP_USERNAME:          ${{ secrets.FTP_USERNAME != '' && '✅ set' || '❌ missing' }}"
          echo "FTP_PASSWORD:          ${{ secrets.FTP_PASSWORD != '' && '✅ set' || '❌ missing' }}"
          echo "AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID != '' && '✅ set' || '❌ missing' }}"
          echo "AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY != '' && '✅ set' || '❌ missing' }}"
          echo "GTMETRIX_API_KEY:      ${{ secrets.GTMETRIX_API_KEY != '' && '✅ set' || '❌ missing' }}"

          [ -z "$COMMENT_ID" ] && exit 0

          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} --jq '.body' \
            > /tmp/current_body.txt 2>/dev/null || exit 0

          NEW_BODY=$(node -e "
            const fs = require('fs');
            let body = fs.readFileSync('/tmp/current_body.txt', 'utf8');
            body = body.replace(
              /(\| Verify Secrets \| )<img[^>]+>( \|)/,
              \`\$1<img src=\"\${process.env.BADGE_COMPLETED}\" width=\"120\" data-linear-height=\"20\">\$2\`
            );
            body = body.replace(
              /(\| Deployment \| )<img[^>]+>( \|)/,
              \`\$1<img src=\"\${process.env.BADGE_IN_PROGRESS}\" width=\"120\" data-linear-height=\"20\">\$2\`
            );
            body = body.replace(
              /<!-- deployment-details -->[\s\S]*?<!-- \/deployment-details -->/,
              '<!-- deployment-details -->\n---\n### Deployment Details:\n\`\`\`\nFTP Deploy: In-Progress\nAWS Deploy: In-Progress\n\`\`\`\n---\n<!-- /deployment-details -->'
            );
            process.stdout.write(body);
          ")
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$NEW_BODY" > /dev/null || true

      

      - name: Fetch PR body if push is from a merged PR
        id: extract
        env:
          PR_BODY: ${{ inputs.pr_body }}
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR context provided — skipping."
          else
            echo "Push originated from PR #${PR_NUMBER} — ${{ inputs.pr_title }}"
            echo "-------- PR Body --------"
            echo "$PR_BODY"
            echo "-------------------------"

            GTMETRIX_URLS=$(echo "$PR_BODY" \
              | awk 'tolower($0) ~ /^### gtmetrix test urls?/{found=1; next} found && /https?:\/\//{match($0,/https?:\/\/[^ \t\r\n]+/); print substr($0,RSTART,RLENGTH)} found && !/https?:\/\// && /^##/{exit}' \
              | tr -d '\r')

            FIRST_ISSUE=$(echo "$PR_BODY" \
              | awk 'tolower($0) ~ /^### issue[[:space:]]*$/{found=1; next} found && /https?:\/\//{match($0,/https?:\/\/[^ \t\r\n]+/); print substr($0,RSTART,RLENGTH); exit}' \
              | tr -d '\r')

            # issue_url written FIRST — must precede any heredoc or parser swallows it
            if [ -n "$FIRST_ISSUE" ]; then
              echo "----- Issue URL ------"
              echo "$FIRST_ISSUE"
              echo "issue_url=${FIRST_ISSUE}" >> "$GITHUB_OUTPUT"
            else
              echo "No issue URL found in PR body."
            fi

            if [ -n "$GTMETRIX_URLS" ]; then
              echo "---- GTmetrix URLs ----"
              echo "$GTMETRIX_URLS"
              DELIMITER="GTMETRIX_$(openssl rand -hex 8)"
              {
                echo "gtmetrix_url<<$DELIMITER"
                echo "$GTMETRIX_URLS"
                echo "$DELIMITER"
              } >> "$GITHUB_OUTPUT"
            else
              echo "No GTmetrix URLs found in PR body."
            fi

            NOTION_URL=$(echo "$PR_BODY" \
              | awk 'tolower($0) ~ /^### notion[[:space:]]*$/{found=1; next} found && /https?:\/\//{match($0,/https?:\/\/[^ \t\r\n]+/); print substr($0,RSTART,RLENGTH); exit}' \
              | tr -d '\r')

            echo "-------------------------"
          fi
 
  # ---------------------------------------------------------------------------
  # Job 2a: Deploy via FTP (runs after PR Info)
  # ---------------------------------------------------------------------------
  deploy-ftp:
    name: FTP Deploy
    needs: [fetching-info]
    uses: ./.github/workflows/ftp-deploy.yml
    permissions:
      contents: write
      issues: write
    with:
      comment_id: ${{ needs.fetching-info.outputs.comment_id }}
    secrets:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

  # ---------------------------------------------------------------------------
  # Job 2b: Deploy to AWS (runs in parallel with deploy-ftp)
  # ---------------------------------------------------------------------------
  deploy-aws:
    name: AWS Deploy
    needs: [fetching-info]
    uses: ./.github/workflows/aws-deploy.yml
    permissions:
      contents: write
      issues: write
    with:
      comment_id: ${{ needs.fetching-info.outputs.comment_id }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Job 3: Validate fetching-info outputs (debug — always runs after PR info)
  # ---------------------------------------------------------------------------
  validate-outputs:
    name: Validate PR Info Outputs
    needs: [fetching-info]
    runs-on: ubuntu-latest
    steps:
      - name: Echo and validate issue_url and gtmetrix_url
        run: |
          ISSUE_URL="${{ needs.fetching-info.outputs.issue_url }}"
          GTMETRIX_URL="${{ needs.fetching-info.outputs.gtmetrix_url }}"
          COMMENT_ID="${{ needs.fetching-info.outputs.comment_id }}"

          echo "=== fetching-info outputs ==="
          echo "issue_url    = '${ISSUE_URL}'"
          echo "gtmetrix_url = '${GTMETRIX_URL}'"
          echo "comment_id   = '${COMMENT_ID}'"
          echo "============================================"

          if [ -z "$ISSUE_URL" ]; then
            echo "⚠️  issue_url is EMPTY"
          elif echo "$ISSUE_URL" | grep -qE '^https://github\.com/.+/issues/[0-9]+$'; then
            echo "✅ issue_url format valid"
          else
            echo "❌ issue_url format unexpected: '$ISSUE_URL'"
          fi

          if [ -z "$GTMETRIX_URL" ]; then
            echo "⚠️  gtmetrix_url is EMPTY"
          elif echo "$GTMETRIX_URL" | grep -qE '^https?://'; then
            echo "✅ gtmetrix_url format valid"
          else
            echo "❌ gtmetrix_url format unexpected: '$GTMETRIX_URL'"
          fi

  # ---------------------------------------------------------------------------
  # Job 4: QA Validation (runs after deploys)
  # ---------------------------------------------------------------------------
  pre-qa-check:
    name: Pre QA Validation
    needs: [fetching-info, deploy-ftp, deploy-aws, validate-outputs]
    if: |
      !cancelled() &&
      needs.fetching-info.outputs.issue_url != ''
    uses: ./.github/workflows/pre-qa-check.yml
    with:
      issue_url: ${{ needs.fetching-info.outputs.issue_url }}
      comment_id: ${{ needs.fetching-info.outputs.comment_id }}
      badge_completed: ${{ inputs.badge_completed }}
      badge_aborted: ${{ inputs.badge_aborted }}
      badge_in_progress: ${{ inputs.badge_in_progress }}
      badge_waiting: ${{ inputs.badge_waiting }}
      badge_failed: ${{ inputs.badge_failed }}
    permissions:
      contents: read
      issues: write

  # ---------------------------------------------------------------------------
  # Job 5a: GTmetrix performance check (runs after pre-QA)
  # ---------------------------------------------------------------------------
  gtmetrix:
    name: GTmetrix Check
    needs: [fetching-info, pre-qa-check]
    if: |
      !cancelled() &&
      needs.fetching-info.outputs.gtmetrix_url != '' &&
      needs.fetching-info.outputs.issue_url != ''
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: read
      id-token: write
    uses: ./.github/workflows/gtmetrix.yml
    with:
      gtmetrix_url: ${{ needs.fetching-info.outputs.gtmetrix_url }}
      issue_url: ${{ needs.fetching-info.outputs.issue_url }}
      comment_id: ${{ needs.fetching-info.outputs.comment_id }}
      badge_completed: ${{ inputs.badge_completed }}
      badge_aborted: ${{ inputs.badge_aborted }}
      badge_in_progress: ${{ inputs.badge_in_progress }}
      badge_waiting: ${{ inputs.badge_waiting }}
    secrets:
      GTMETRIX_API_KEY: ${{ secrets.GTMETRIX_API_KEY }}
  
  # ---------------------------------------------------------------------------
  # Job 5b: Post QA Validation (runs after pre-QA)
  # ---------------------------------------------------------------------------
  post-qa-check:
    name: Post QA Validation
    needs: [fetching-info, pre-qa-check]
    if: |
      !cancelled() &&
      needs.fetching-info.outputs.gtmetrix_url != '' &&
      needs.fetching-info.outputs.issue_url != ''
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/post-qa-check.yml
    with:
      urls: ${{ needs.fetching-info.outputs.gtmetrix_url }}
      issue_url: ${{ needs.fetching-info.outputs.issue_url }}
      comment_id: ${{ needs.fetching-info.outputs.comment_id }}
      badge_completed: ${{ inputs.badge_completed }}
      badge_aborted: ${{ inputs.badge_aborted }}
      badge_in_progress: ${{ inputs.badge_in_progress }}
      badge_waiting: ${{ inputs.badge_waiting }}
      badge_passed: ${{ inputs.badge_passed }}
      badge_failed: ${{ inputs.badge_failed }}

  # ---------------------------------------------------------------------------
  # Job 6: Mark workflow completed (runs after GTmetrix)
  # ---------------------------------------------------------------------------
  workflow-complete:
    name: Mark Workflow Completed
    needs: [fetching-info, gtmetrix]
    if: |
      !cancelled() &&
      needs.fetching-info.outputs.comment_id != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Update comment header to Completed
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ needs.fetching-info.outputs.comment_id }}
          PR_TITLE: ${{ inputs.pr_title }}
        run: |
          CURRENT=$(gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} --jq '.body')
          NEW_BODY=$(echo "$CURRENT" | node -e "
            const lines = [];
            const rl = require('readline').createInterface({ input: process.stdin });
            rl.on('line', l => lines.push(l));
            rl.on('close', () => {
              let body = lines.join('\n');
              body = body.replace(
                /^(## )(?:<img[^>]+\/>\s*)?Standard Workflow: (.+?) In-Progress$/m,
                '\$1Standard Workflow: \$2 Completed'
              );
              process.stdout.write(body);
            });
          ")
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$NEW_BODY"