# -----------------------------------------------------------------------------
# Workflow: FTP Deploy (Root + Pages <img> Replacement)
# -----------------------------------------------------------------------------
name: FTP Deploy

on:
  workflow_call:
    secrets:
      FTP_SERVER:
        required: true
      FTP_USERNAME:
        required: true
      FTP_PASSWORD:
        required: true

permissions:
  contents: write

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------
      # Checkout repository
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ---------------------------------------------------------
      # Check for uploadable file changes
      # ---------------------------------------------------------
      - name: Check for uploadable file changes
        id: uploadcheck
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AMD ${{ github.event.before }} ${{ github.sha }} \
            | grep -E '\.(html|php|css|js|htaccess|txt)$' || true)

          if [ -z "$CHANGED" ]; then
            echo "⚠️ No uploadable files (.html, .php, .css, .js, .htaccess, .txt) detected. Skipping deploy."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Uploadable files detected:"
            echo "$CHANGED"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # Detect root file changes
      # ---------------------------------------------------------
      - name: Detect root file changes
        id: rootcheck
        if: steps.uploadcheck.outputs.has_changes == 'true'
        run: |
          ROOT_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep -E '^(index\.html|index\.php)$' || true)

          if [ -n "$ROOT_CHANGED" ]; then
            echo "root_changed=true" >> $GITHUB_OUTPUT
          else
            echo "root_changed=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # Detect changed folders inside /pages
      # ---------------------------------------------------------
      - name: Detect changed folders in /pages
        id: pagescheck
        if: steps.uploadcheck.outputs.has_changes == 'true'
        run: |
          FOLDERS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^pages/' \
            | cut -d/ -f2 \
            | sort -u)

          if [ -z "$FOLDERS" ]; then
            echo "pages_changed=false" >> $GITHUB_OUTPUT
          else
            echo "pages_changed=true" >> $GITHUB_OUTPUT
            echo "folders=$(echo $FOLDERS | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # Replace <img> src with CDN path
      # ---------------------------------------------------------
      - name: Checkout automation-workflow scripts
        if: steps.uploadcheck.outputs.has_changes == 'true'
        uses: actions/checkout@v3
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow

      - name: Replace img src with CDN path
        if: steps.uploadcheck.outputs.has_changes == 'true'
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: node EnclaveLLC/automation-workflow/scripts/ftp_deploy/replace-img.js

      # ---------------------------------------------------------
      # Commit changes
      # ---------------------------------------------------------
      - name: Commit updated files
        if: steps.uploadcheck.outputs.has_changes == 'true'
        run: |
          BRANCH=${{ github.ref_name }}
          REPO_NAME=${{ github.event.repository.name }}
          git config user.name "enc-action[bot]"
          git config user.email "enc-action[bot]@users.noreply.github.com"

          git add -A
          git commit -m "♻️ Update img src tag to CDN path https://d3j6ngx7p7lglj.cloudfront.net/${REPO_NAME}" || echo "No changes to commit"

          git pull origin $BRANCH --no-rebase || true
          git push origin HEAD:$BRANCH

      # ---------------------------------------------------------
      # Re-checkout latest commit to ensure FTP sees updated files
      # ---------------------------------------------------------
      - name: Re-checkout latest commit
        if: steps.uploadcheck.outputs.has_changes == 'true' && steps.pagescheck.outputs.pages_changed == 'true'
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      # ---------------------------------------------------------
      # Upload files via FTP
      # ---------------------------------------------------------
      - name: Upload files via FTP
        if: steps.uploadcheck.outputs.has_changes == 'true'
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /
          include: |
            index.html
            index.php
            **/*.css
            **/*.js
          exclude: |
            **/.git/**
            **/.gitignore
            **/node_modules/**
            **/*.jpg
            **/*.jpeg
            **/*.png
            **/*.gif
            **/*.webp
            **/*.svg
            **/*.ico
            **/*.avif
            **/*.mp4
            **/.github/**
            readme.md
            build-tailwind.js
            tailwind.config.js
            package-lock.json
            package.json
