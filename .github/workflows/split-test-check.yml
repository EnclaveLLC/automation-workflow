name: Split Test Check

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      repository:
        required: true
        type: string

jobs:
  # ── Job 1: Parse issue body ──────────────────────────────────────────────────
  parse-issue:
    name: Parse Issue Body
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      control_url: ${{ steps.parse.outputs.control_url }}
      variations:  ${{ steps.parse.outputs.variations }}
      comment_id:  ${{ steps.progress.outputs.comment_id }}
    steps:
      - name: Post progress comment
        id: progress
        run: |
          COMMENT_ID=$(gh api repos/${{ inputs.repository }}/issues/${{ inputs.issue_number }}/comments \
            -X POST \
            -f body="<img src=\"https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-loading.svg\" width=\"20\" height=\"20\" data-linear-height=\"20\"/> Split test check in progress — running 50 requests on control URL" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ github.token }}

      - name: Parse issue body
        id: parse
        run: |
          ISSUE_BODY=$(gh api repos/${{ inputs.repository }}/issues/${{ inputs.issue_number }} --jq '.body')
          export ISSUE_BODY
          node EnclaveLLC/automation-workflow/scripts/split_test/parse_issue.js

  # ── Job 2: Run 50 browser checks and report redirect distribution ────────────
  run-check:
    name: Run Check
    needs: parse-issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run 50 browser checks and post report
        env:
          CONTROL_URL: ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:  ${{ needs.parse-issue.outputs.variations }}
          COMMENT_ID:  ${{ needs.parse-issue.outputs.comment_id }}
          REPO:        ${{ inputs.repository }}
        run: |
          set -euo pipefail

          node - << 'SCRIPT'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const controlUrl    = process.env.CONTROL_URL || '';
          const variationsRaw = process.env.VARIATIONS  || '[]';
          const commentId     = process.env.COMMENT_ID;
          const repo          = process.env.REPO;

          let variations = [];
          try { variations = JSON.parse(variationsRaw); } catch(e) {}

          const TOTAL       = 50;
          const CONCURRENCY = 5;

          function getPath(url) {
            try {
              if (url.startsWith('http://') || url.startsWith('https://')) {
                return new URL(url).pathname.replace(/\/$/, '');
              }
              return url.split('?')[0].replace(/\/$/, '');
            } catch(e) { return url; }
          }

          async function checkFinalUrl(browser, url) {
            const context = await browser.newContext();
            const page    = await context.newPage();
            try {
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 20000 });
              return page.url();
            } catch(e) {
              console.log(`Request error: ${e.message}`);
              return '';
            } finally {
              await context.close();
            }
          }

          async function main() {
            const browser = await chromium.launch({ headless: true });
            try {
              const results = [];
              for (let i = 0; i < TOTAL; i += CONCURRENCY) {
                const batch = Math.min(CONCURRENCY, TOTAL - i);
                const batchResults = await Promise.all(
                  Array.from({ length: batch }, () => checkFinalUrl(browser, controlUrl))
                );
                results.push(...batchResults);
                console.log(`[${Math.min(i + CONCURRENCY, TOTAL)}/${TOTAL}] checks completed`);
              }

              const controlPath = getPath(controlUrl);
              const counts      = new Map(variations.map(v => [v.url, 0]));
              let controlCount  = 0;
              let unknownCount  = 0;

              for (const finalUrl of results) {
                if (!finalUrl) { controlCount++; continue; }

                if (getPath(finalUrl) === controlPath) {
                  controlCount++;
                  continue;
                }

                let matched = false;
                for (const v of variations) {
                  if (getPath(finalUrl) === getPath(v.url)) {
                    counts.set(v.url, (counts.get(v.url) || 0) + 1);
                    matched = true;
                    break;
                  }
                }
                if (!matched) {
                  unknownCount++;
                  console.log(`Unmatched: ${finalUrl}`);
                }
              }

              const rows = ['<!-- linear:table-colwidths:298, 65-->', '| Version | Redirects |', '|:---|:---:|'];
              rows.push(`| ${controlUrl} | ${controlCount} |`);
              for (const v of variations) {
                rows.push(`| ${v.url} | ${counts.get(v.url) || 0} |`);
              }
              if (unknownCount > 0) {
                rows.push(`| ⚠️ Other / unmatched | ${unknownCount} |`);
              }

              const report = [
                '### Split Test Check Results',
                '',
                `**Control:** ${controlUrl}`,
                '',
                rows.join('\n'),
                '',
                `_${TOTAL} total requests_`,
              ].join('\n');

              fs.writeFileSync('/tmp/check_report.md', report);
              console.log('\n--- Report ---\n' + report);
            } finally {
              await browser.close();
            }
          }

          main().catch(err => { console.error(err); process.exit(1); });
          SCRIPT

          gh api repos/${REPO}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(cat /tmp/check_report.md)"

  # ── Job: Handle failure ──────────────────────────────────────────────────────
  handle-failure:
    name: Handle Failure
    needs: [parse-issue, run-check]
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Update comment with failure message
        env:
          COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          if [ -z "$COMMENT_ID" ]; then
            echo "No comment ID, skipping"
            exit 0
          fi
          gh api repos/${{ inputs.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### Split Test Check Failed\n\nAn error occurred. Please check the [workflow run](%s/%s/actions/runs/%s) for details.' \
              "${{ github.server_url }}" "${{ inputs.repository }}" "${{ github.run_id }}")"
