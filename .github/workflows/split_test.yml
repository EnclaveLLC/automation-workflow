name: Split Test

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number that triggered this workflow"
        required: true
        type: number
      type:
        description: "Split test action ('on' or 'off')"
        required: true
        type: string

jobs:
  # ── Job 1: Parse issue body ─────────────────────────────────────────────────
  parse-issue:
    name: Parse Issue Body
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      control_url:  ${{ steps.parse.outputs.control_url }}
      control_path: ${{ steps.parse.outputs.control_path }}
      variations:   ${{ steps.parse.outputs.variations }}
      comment_id:   ${{ steps.progress_comment.outputs.comment_id }}

    steps:
      - name: Comment split test in progress
        id: progress_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            -X POST \
            -f body="<img src=\"https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/loading.svg\" width=\"20\" height=\"20\"/> ${{ inputs.type == 'on' && 'Enabling' || 'Disabling' }} split test in progress" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node EnclaveLLC/automation-workflow/scripts/split_test/parse_issue.js

  # ── Job 2: Verify control and variation paths exist ─────────────────────────
  check-paths:
    name: Check Paths Exist
    needs: parse-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Update comment — verifying URLs
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID:  ${{ needs.parse-issue.outputs.comment_id }}
          CONTROL_URL: ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:  ${{ needs.parse-issue.outputs.variations }}
        run: |
          VARIATION_LINES=$(echo "$VARIATIONS" | jq -r '.[] | "- \(.name): \(.url)"')
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '<img src="https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/loading.svg" width="20" height="20"/> Verifying URLs\n\nControl Page\n- %s\n\nVariations\n%s' "$CONTROL_URL" "$VARIATION_LINES")"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Verify paths exist
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
          CONTROL_URL:  ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:   ${{ needs.parse-issue.outputs.variations }}
          COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          set -euo pipefail
          MISSING=""

          CONTROL_PATH="${CONTROL_PATH#/}"
          if [ ! -e "$CONTROL_PATH" ]; then
            MISSING="${MISSING}❌ ${CONTROL_URL}\n"
          elif [ ! -f "$CONTROL_PATH/index.php" ]; then
            MISSING="${MISSING}❌ ${CONTROL_URL} (index.php not found)\n"
          else
            echo "✅ Control path exists: $CONTROL_PATH"
            echo "✅ index.php found in: $CONTROL_PATH"
          fi

          if [ "$(echo "$VARIATIONS" | jq 'length')" -gt 0 ]; then
            while IFS='|' read -r VAR_PATH VAR_URL; do
              VAR_PATH="${VAR_PATH#/}"
              if [ ! -e "$VAR_PATH" ]; then
                MISSING="${MISSING}❌ ${VAR_URL}\n"
              else
                echo "✅ Variation path exists: $VAR_PATH"
              fi
            done < <(echo "$VARIATIONS" | jq -r '.[] | "\(.path)|\(.url)"')
          else
            echo "No variations provided — skipping variation path check."
          fi

          if [ -n "$MISSING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### Split Test Validation Failed\n\nThe following issue(s) were found:\n\n'"$MISSING")"
            exit 1
          fi

          echo "✅ All paths verified."

          VARIATION_LINES=$(echo "$VARIATIONS" | jq -r '.[] | "✅ \(.name): \(.url)"')
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### Split Test Validation Passed\n\n\nControl Page\n✅ %s\n\nVariations\n%s\n\nResult:\n✅ All URLs exist in the repository' "$CONTROL_URL" "$VARIATION_LINES")"

  # ── Job 3: Add split test code ───────────────────────────────────────────────
  add-split-test-code:
    if: inputs.type == 'on' && needs.check-paths.result == 'success'
    name: Add Split Test Code
    needs: [parse-issue, check-paths]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
      VARIATIONS:   ${{ needs.parse-issue.outputs.variations }}
      COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}

    steps:
      - name: Comment adding split test code in progress
        id: add_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ADD_COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            -X POST \
            -f body="<img src=\"https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/loading.svg\" width=\"20\" height=\"20\"/> Split test code implementation in progress" \
            --jq '.id')
          echo "comment_id=$ADD_COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add split test code
        run: node EnclaveLLC/automation-workflow/scripts/split_test/add_split_test_code.js

      - name: Set branch name
        run: |
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-\|-$//g')
          echo "BRANCH_NAME=${SLUG}-${{ github.run_id }}" >> "$GITHUB_ENV"

      - name: Create branch
        run: |
          set -euo pipefail
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "ERROR: Branch '$BRANCH_NAME' already exists on remote."
            exit 1
          fi
          git checkout -b "$BRANCH_NAME"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          set -euo pipefail
          git add .
          git commit -m "${{ github.event.issue.title }}"

      - name: Push branch
        run: |
          set -euo pipefail
          git push -u origin "$BRANCH_NAME"

      - name: Create pull request
        id: create_pr
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          CONTROL_URL: ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:  ${{ needs.parse-issue.outputs.variations }}
        run: |
          set -euo pipefail
          ISSUE_NUMBER="${{ inputs.issue_number }}"
          REPO="${{ github.repository }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          VARIATION_LIST=$(echo "$VARIATIONS" | jq -r '.[] | "- \(.name): \(.url)"')

          cat > /tmp/pr_body.md << PREOF
          ### Summary
          - Split test code added to control page
          - PR created

          ### Control Page
          ${CONTROL_URL}

          ### Variations
          ${VARIATION_LIST}

          ### GTMetrix Test URLs
          ${CONTROL_URL}
          ${VARIATION_LIST}

          ### Issue
          https://github.com/${REPO}/issues/${ISSUE_NUMBER}
          PREOF

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title --jq '.title')

          PR_URL=$(gh pr create \
            --base  "$DEFAULT_BRANCH" \
            --head  "$BRANCH_NAME" \
            --title "$ISSUE_TITLE" \
            --body-file /tmp/pr_body.md)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"

      - name: Update comment — split test complete
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          CONTROL_URL: ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:  ${{ needs.parse-issue.outputs.variations }}
          PR_URL:      ${{ steps.create_pr.outputs.pr_url }}
          ADD_COMMENT_ID: ${{ steps.add_comment.outputs.comment_id }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${ADD_COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### Summary\n- Split test code added to control page\n- PR created\n\n### Control Page\n%s\n\nThe split test ${{ inputs.type }} is now available in PR to review:\n%s' "$CONTROL_URL" "$PR_URL")"
