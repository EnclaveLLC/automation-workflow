name: Split Test

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number that triggered this workflow"
        required: true
        type: number
      type:
        description: "Split test action ('on' or 'off')"
        required: true
        type: string

jobs:
  # ── Job 1: Parse issue body ─────────────────────────────────────────────────
  parse-issue:
    name: Parse Issue Body
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      control_url:  ${{ steps.parse.outputs.control_url }}
      control_path: ${{ steps.parse.outputs.control_path }}
      variations:   ${{ steps.parse.outputs.variations }}
      comment_id:   ${{ steps.progress_comment.outputs.comment_id }}

    steps:
      - name: Comment split test in progress
        id: progress_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            -X POST \
            -f body="<img src=\"https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/loading.svg\" width=\"20\" height=\"20\"/> Split test ${{ inputs.type }} in progress" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node EnclaveLLC/automation-workflow/scripts/split_test/parse_issue.js

  # ── Job 2: Verify control and variation paths exist ─────────────────────────
  check-paths:
    name: Check Paths Exist
    needs: parse-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Update comment — verifying URLs
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID:  ${{ needs.parse-issue.outputs.comment_id }}
          CONTROL_URL: ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:  ${{ needs.parse-issue.outputs.variations }}
        run: |
          VARIATION_LINES=$(echo "$VARIATIONS" | jq -r '.[] | "- \(.name): \(.url)"')
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '<img src="https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/loading.svg" width="20" height="20"/> Verifying URLs\n\n### Control Page\n- %s\n\n### Variations\n%s' "$CONTROL_URL" "$VARIATION_LINES")"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Verify paths exist
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          CONTROL_PATH: ${{ needs.parse-issue.outputs.control_path }}
          CONTROL_URL:  ${{ needs.parse-issue.outputs.control_url }}
          VARIATIONS:   ${{ needs.parse-issue.outputs.variations }}
          COMMENT_ID:   ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          set -euo pipefail
          MISSING=""

          CONTROL_PATH="${CONTROL_PATH#/}"
          if [ ! -e "$CONTROL_PATH" ]; then
            MISSING="${MISSING}❌ ${CONTROL_URL}\n"
          else
            echo "✅ Control path exists: $CONTROL_PATH"
          fi

          while IFS='|' read -r VAR_PATH VAR_URL; do
            VAR_PATH="${VAR_PATH#/}"
            if [ ! -e "$VAR_PATH" ]; then
              MISSING="${MISSING}❌ ${VAR_URL}\n"
            else
              echo "✅ Variation path exists: $VAR_PATH"
            fi
          done < <(echo "$VARIATIONS" | jq -r '.[] | "\(.path)|\(.url)"')

          if [ -n "$MISSING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### Split Test Validation Failed\nThe following variation URL does not exist in the repository:\n\n'"$MISSING")"
            exit 1
          fi

          echo "✅ All paths verified."
