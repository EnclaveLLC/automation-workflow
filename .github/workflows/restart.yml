name: Restart Workflow

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      repository:
        required: true
        type: string

jobs:
  get-label:
    name: Get Issue Label
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      label_name: ${{ steps.get.outputs.label_name }}
    steps:
      - name: Get trigger label from issue
        id: get
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LABEL=$(gh issue view "${{ inputs.issue_number }}" --repo "${{ inputs.repository }}" --json labels \
            --jq '.labels[].name | select(
              . == "Page Duplicate" or
              . == "New Page" or
              . == "Split Test On" or
              . == "Split Test Off"
            )' | head -1)

          if [ -z "$LABEL" ]; then
            echo "❌ No trigger label found on this issue."
            exit 1
          fi

          echo "label_name=$LABEL" >> "$GITHUB_OUTPUT"

  dispatch:
    name: Restart Workflow
    needs: get-label
    uses: ./.github/workflows/standard_workflow.yml
    with:
      label_name: ${{ needs.get-label.outputs.label_name }}
      issue_number: ${{ inputs.issue_number }}
    secrets: inherit
    permissions:
      contents: write
      issues: write
      pull-requests: write
