# -----------------------------------------------------------------------------
# Workflow: Post-Deployment QA Check (reusable)
# Checks (via Playwright) per live URL:
#   1. All images on the page are below 1 MB
#   2. Robots meta tag is set to noindex, nofollow
#   3. GTM Container ID is present
# Outputs: qa_passed, post_qa_details
# -----------------------------------------------------------------------------
name: Post-Deployment QA

on:
  workflow_call:
    inputs:
      urls:
        description: "Newline-separated live URLs to check"
        required: true
        type: string
      issue_url:
        description: "GitHub issue URL"
        required: false
        type: string
      comment_id:
        description: "Existing issue comment ID to update"
        required: false
        type: string
      badge_completed:
        description: "Image URL for the completed status badge"
        required: false
        type: string
      badge_aborted:
        description: "Image URL for the aborted status badge"
        required: false
        type: string
      badge_in_progress:
        description: "Image URL for the in-progress status badge"
        required: false
        type: string
      badge_waiting:
        description: "Image URL for the waiting status badge"
        required: false
        type: string
      badge_passed:
        description: "Image URL for the passed status badge"
        required: false
        type: string
      badge_failed:
        description: "Image URL for the failed status badge"
        required: false
        type: string
      notion_json:
        description: "All Notion fields as a single JSON object"
        required: false
        type: string
    outputs:
      qa_passed:
        description: "'true' if all checks passed, 'false' otherwise"
        value: ${{ jobs.post-qa-check.outputs.qa_passed }}
      post_qa_details:
        description: "Formatted per-URL QA result tables"
        value: ${{ jobs.post-qa-check.outputs.post_qa_details }}

jobs:
  post-qa-check:
    name: Post-Deployment QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      qa_passed:       ${{ steps.check.outputs.qa_passed }}
      post_qa_details: ${{ steps.check.outputs.post_qa_details }}

    steps:
      - name: Post Quality Assurance in progress
        if: inputs.comment_id != ''
        env:
          COMMENT_ID:        ${{ inputs.comment_id }}
          BADGE_IN_PROGRESS: ${{ inputs.badge_in_progress }}
          URLS:              ${{ inputs.urls }}
          NOTION_JSON:       ${{ inputs.notion_json }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} --jq '.body' \
            > /tmp/current_body.txt 2>/dev/null || exit 0

          NEW_BODY=$(node -e "
            const fs = require('fs');
            let body = fs.readFileSync('/tmp/current_body.txt', 'utf8');

            body = body.replace(
              /(\| Post Quality Assurance \| )<img[^>]+>( \|)/,
              \`\$1<img src=\"\${process.env.BADGE_IN_PROGRESS}\" width=\"120\" data-linear-height=\"20\">\$2\`
            );

            const urls = (process.env.URLS || '').split('\n').filter(Boolean);
            const notionRawPre = process.env.NOTION_JSON || '';
            const notionGtmPre = notionRawPre ? (JSON.parse(notionRawPre).gtm || '').trim() : '';
            const checks = [
              'Image less than 1MB',
              'Robots directives set to \`noindex, nofollow\`',
              notionGtmPre ? \`GTM Container ID (\${notionGtmPre}) verified\` : 'GTM Container ID verified',
            ];

            let details = '---\n### Post Quality Assurance\n\n';
            for (const url of urls) {
              details += 'Page: ' + url + '\n\n';
              details += '<!-- linear:table-colwidths:215,154 -->\n';
              details += '| Post QA Items | Status |\n';
              details += '|:---|:---|\n';
              for (const check of checks) {
                details += '| ' + check + ' | <img src=\"' + process.env.BADGE_IN_PROGRESS + '\" width=\"120\" data-linear-height=\"20\"> |\n';
              }
              details += '\n';
            }

            body = body.replace(
              /<!-- post-qa-details -->[\s\S]*?<!-- \/post-qa-details -->/,
              '<!-- post-qa-details -->\n' + details.trim() + '\n<!-- /post-qa-details -->'
            );

            process.stdout.write(body);
          ")
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$NEW_BODY" > /dev/null || true

      - name: Install Playwright
        working-directory: /tmp
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run Post-QA checks via Playwright
        id: check
        env:
          URLS:         ${{ inputs.urls }}
          NOTION_JSON:  ${{ inputs.notion_json }}
          BADGE_PASSED: ${{ inputs.badge_passed }}
          BADGE_FAILED: ${{ inputs.badge_failed }}
        run: |
          cat > /tmp/check_post_qa.js << 'SCRIPT'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const urls = (process.env.URLS || '').split('\n').filter(Boolean);
            const ONE_MB = 1024 * 1024;
            const results = [];

            for (const pageUrl of urls) {
              console.log(`\n=== Checking: ${pageUrl} ===`);
              const browser = await chromium.launch();
              const page = await browser.newPage();
              const promises = [];

              page.on('response', (res) => {
                const ct = res.headers()['content-type'] || '';
                if (!ct.startsWith('image/')) return;
                promises.push(
                  res.body()
                    .then(buf => ({ url: res.url(), size: buf.length }))
                    .catch(() => null)
                );
              });

              let response;
              try {
                response = await page.goto(pageUrl, { waitUntil: 'networkidle', timeout: 60000 });
                await page.evaluate(() => window.scrollTo(0, document.body.scrollHeight));
                await page.waitForTimeout(3000);
              } catch (e) {
                console.error(`  Error loading ${pageUrl}: ${e.message}`);
                await browser.close();
                results.push({ pageUrl, error: e.message });
                continue;
              }

              // Check 1: Images < 1MB
              const images = (await Promise.all(promises)).filter(Boolean);
              const largeImages = images.filter(img => img.size >= ONE_MB);
              const imageSizeOk = largeImages.length === 0;
              console.log(`  Images: ${images.length} total, ${largeImages.length} oversized`);
              largeImages.forEach(img =>
                console.log(`  OVERSIZED: ${img.url} (${(img.size / 1024 / 1024).toFixed(2)} MB)`)
              );

              // Check 2: Robots noindex, nofollow (X-Robots-Tag header or meta tag)
              const xRobotsTag = (response && response.headers()['x-robots-tag'] || '').toLowerCase();
              const metaRobots = await page
                .$eval('meta[name="robots"]', el => el.getAttribute('content'))
                .catch(() => null);
              const robotsSource = xRobotsTag || (metaRobots || '').toLowerCase();
              const robotsOk = robotsSource.includes('noindex') && robotsSource.includes('nofollow');
              console.log(`  Robots: ${robotsSource || 'not found'} => ${robotsOk ? 'OK' : 'FAIL'}`);

              // Check 3: GTM Container ID
              const pageContent = await page.content();
              const notionRaw = process.env.NOTION_JSON || '';
              const notionGtm = notionRaw ? (JSON.parse(notionRaw).gtm || '').trim() : '';
              const gtmMatch = pageContent.match(/GTM-[A-Z0-9]+/);
              const gtmOk = !!notionGtm && pageContent.includes(notionGtm);
              console.log(`  GTM: expected=${notionGtm || 'any'} found=${gtmMatch ? gtmMatch[0] : 'not found'} => ${gtmOk ? 'OK' : 'FAIL'}`);

              results.push({
                pageUrl,
                checks: { imageSizeOk, robotsOk, gtmOk },
                largeImages: largeImages.map(img => ({
                  url: img.url,
                  sizeMB: parseFloat((img.size / 1024 / 1024).toFixed(2)),
                })),
                totalImages: images.length,
              });

              await browser.close();
            }

            fs.writeFileSync('/tmp/post_qa_results.json', JSON.stringify(results, null, 2));
          })().catch(e => {
            console.error('Fatal:', e.message);
            process.exit(1);
          });
          SCRIPT

          cd /tmp && node check_post_qa.js

          cat > /tmp/parse_post_qa.js << 'PARSE'
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('/tmp/post_qa_results.json', 'utf8'));
          const outputFile = process.env.GITHUB_OUTPUT;

          let allPassed = true;
          let tablesMd = '';

          for (const r of results) {
            if (r.error) {
              allPassed = false;
              tablesMd += `Page: ${r.pageUrl}\n\nError loading page: ${r.error}\n\n`;
              continue;
            }

            const { imageSizeOk, robotsOk, gtmOk } = r.checks;
            const pagePassed = imageSizeOk && robotsOk && gtmOk;
            if (!pagePassed) allPassed = false;

            const badgePassed = process.env.BADGE_PASSED;
            const badgeFailed = process.env.BADGE_FAILED;
            const status = ok => ok
              ? '<img src="' + badgePassed + '" width="120" data-linear-height="20">'
              : '<img src="' + badgeFailed + '" width="120" data-linear-height="20">';

            tablesMd += `Page: ${r.pageUrl}\n\n`;
            tablesMd += '<!-- linear:table-colwidths:215,154 -->\n';
            tablesMd += `| Post QA Items | Status |\n`;
            tablesMd += `|:---|:---|\n`;
            tablesMd += `| Image less than 1MB | ${status(imageSizeOk)} |\n`;
            tablesMd += `| Robots directives set to \`noindex, nofollow\` | ${status(robotsOk)} |\n`;
            tablesMd += `| GTM Container ID (${notionGtm}) verified | ${status(gtmOk)} |\n`;
            tablesMd += '\n';
          }

          const header = `---\n### Post Quality Assurance ${allPassed ? 'Passed:' : 'Failed:'}\n\n`;
          const fullDetails = (header + tablesMd).trim();

          let output = `qa_passed=${allPassed}\n`;
          output += `post_qa_details<<EOF\n${fullDetails}\nEOF\n`;

          fs.appendFileSync(outputFile, output);
          PARSE

          node /tmp/parse_post_qa.js

      - name: Update comment with Post-QA result
        if: inputs.comment_id != ''
        env:
          COMMENT_ID:      ${{ inputs.comment_id }}
          QA_PASSED:       ${{ steps.check.outputs.qa_passed }}
          POST_QA_DETAILS: ${{ steps.check.outputs.post_qa_details }}
          BADGE_PASSED:    ${{ inputs.badge_passed }}
          BADGE_FAILED:    ${{ inputs.badge_failed }}
        run: |
          BADGE_URL="$BADGE_FAILED"
          [ "$QA_PASSED" = "true" ] && BADGE_URL="$BADGE_PASSED"

          CURRENT=$(gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} --jq '.body')
          echo "$CURRENT" > /tmp/current_body.txt
          printf '%s' "$POST_QA_DETAILS" > /tmp/post_qa_details.txt

          cat > /tmp/update_post_qa.js << 'SCRIPT'
          const fs = require('fs');
          let body = fs.readFileSync('/tmp/current_body.txt', 'utf8');
          const details = fs.readFileSync('/tmp/post_qa_details.txt', 'utf8').trim();

          body = body.replace(
            /(\| Post Quality Assurance \| )<img[^>]+>( \|)/,
            `$1<img src="${process.env.BADGE_URL}" width="120" data-linear-height="20">$2`
          );
          body = body.replace(
            /<!-- post-qa-details -->[\s\S]*?<!-- \/post-qa-details -->/,
            `<!-- post-qa-details -->\n${details}\n<!-- /post-qa-details -->`
          );

          process.stdout.write(body);
          SCRIPT

          NEW_BODY=$(BADGE_URL="$BADGE_URL" node /tmp/update_post_qa.js)
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$NEW_BODY"
