# -----------------------------------------------------------------------------
# Workflow: Notion Parse
# Filters the Domains → Tech Reference database by the calling repo name
# (which matches the domain URL) and exposes all fields as a single JSON output.
# Source: https://app.notion.com/p/konscious/a74913462eaa4c23bbb6cdc985b5000d
# -----------------------------------------------------------------------------
name: Notion Parse

on:
  workflow_call:
    inputs:
      repo_name:
        description: "Repository name used to filter the Notion database by URL (e.g. senecahealthads.com)"
        required: true
        type: string
      comment_id:
        description: "Issue comment ID to update"
        required: false
        type: string
    secrets:
      NOTION_TOKEN:
        required: true
    outputs:
      notion_json:
        description: "All Notion fields as a single JSON object"
        value: ${{ jobs.parse.outputs.notion_json }}

jobs:
  parse:
    name: Parse Notion Database
    runs-on: ubuntu-latest
    outputs:
      notion_json: ${{ steps.fetch.outputs.notion_json }}

    steps:
      - name: Query Notion database
        id: fetch
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          REPO_NAME: ${{ inputs.repo_name }}
        run: |
          DATABASE_ID="a7491346-2eaa-4c23-bbb6-cdc985b5000d"

          PAYLOAD=$(jq -n --arg repo "$REPO_NAME" '{
            filter: {
              property: "URL",
              url: { contains: $repo }
            }
          }')

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.notion.com/v1/databases/$DATABASE_ID/query")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Notion API returned HTTP $HTTP_CODE"
            echo "$BODY" | jq -r '.message // .' 2>/dev/null || echo "$BODY"
            exit 1
          fi

          MATCH_COUNT=$(echo "$BODY" | jq '.results | length')

          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "⚠️ No Notion entry found for URL containing: $REPO_NAME"
            exit 0
          fi

          echo "✅ Found $MATCH_COUNT match(es) for '$REPO_NAME'"

          ROW=$(echo "$BODY" | jq -c '.results[0]')

          echo "🔍 Available properties:"
          echo "$ROW" | jq -r '.properties | keys[]' | sed 's/^/    /'

          extract() {
            echo "$ROW" | jq -r "$1 // empty"
          }

          DOMAIN_NAME=$(extract '.properties["Domain Name"].title[0].plain_text')
          URL=$(extract '.properties["URL"].url')
          TYPE=$(extract '.properties["Type"].rich_text[0].plain_text')
          PRODUCT=$(extract '.properties["Product"].rich_text[0].plain_text')
          GTM=$(extract '.properties["GTM"].select.name')
          META_PIXEL=$(extract '.properties["Meta Pixel"].rich_text[0].plain_text')
          SAMCART_DOMAIN=$(extract '.properties["Samcart Domain"].url')
          CHECKOUT_1_PACK=$(extract '.properties["1 Pack Checkout"].rich_text[0].plain_text')
          CHECKOUT_3_PACK=$(extract '.properties["3 Pack Checkout"].rich_text[0].plain_text')
          CHECKOUT_6_PACK=$(extract '.properties["6 Pack Checkout"].rich_text[0].plain_text')
          CHECKOUT_9_PACK=$(extract '.properties["9 Pack Checkout"].rich_text[0].plain_text')
          BUYER_AGENCY=$(extract '.properties["Buyer/Agency"].rich_text[0].plain_text')
          MARKETPLACE=$(extract '.properties["Marketplace"].rich_text[0].plain_text')
          GOOGLE_ACCOUNTS=$(extract '.properties["Google Accounts"].rich_text[0].plain_text')
          TABOOLA_PIXEL=$(extract '.properties["Taboola Pixel"].rich_text[0].plain_text')
          TIKTOK_PIXEL=$(extract '.properties["Tiktok Pixel"].rich_text[0].plain_text')
          OFFER_ID=$(extract '.properties["offer_id"].rich_text[0].plain_text')
          GDPR=$(echo "$ROW" | jq -r '.properties["GDPR"].checkbox')

          echo "  Domain:          $DOMAIN_NAME"
          echo "  URL:             $URL"
          echo "  Type:            $TYPE"
          echo "  Product:         $PRODUCT"
          echo "  GTM:             $GTM"
          echo "  Meta Pixel:      $META_PIXEL"
          echo "  Samcart:         $SAMCART_DOMAIN"
          echo "  1 Pack Checkout: $CHECKOUT_1_PACK"
          echo "  3 Pack Checkout: $CHECKOUT_3_PACK"
          echo "  6 Pack Checkout: $CHECKOUT_6_PACK"
          echo "  Buyer/Agency:    $BUYER_AGENCY"
          echo "  GDPR:            $GDPR"

          NOTION_JSON=$(jq -cn \
            --arg domain_name      "$DOMAIN_NAME" \
            --arg url              "$URL" \
            --arg type             "$TYPE" \
            --arg product          "$PRODUCT" \
            --arg gtm              "$GTM" \
            --arg meta_pixel       "$META_PIXEL" \
            --arg samcart_domain   "$SAMCART_DOMAIN" \
            --arg checkout_1_pack  "$CHECKOUT_1_PACK" \
            --arg checkout_3_pack  "$CHECKOUT_3_PACK" \
            --arg checkout_6_pack  "$CHECKOUT_6_PACK" \
            --arg checkout_9_pack  "$CHECKOUT_9_PACK" \
            --arg buyer_agency     "$BUYER_AGENCY" \
            --arg marketplace      "$MARKETPLACE" \
            --arg google_accounts  "$GOOGLE_ACCOUNTS" \
            --arg taboola_pixel    "$TABOOLA_PIXEL" \
            --arg tiktok_pixel     "$TIKTOK_PIXEL" \
            --arg offer_id         "$OFFER_ID" \
            --argjson gdpr         "$GDPR" \
            '{domain_name, url, type, product, gtm, meta_pixel, samcart_domain,
              checkout_1_pack, checkout_3_pack, checkout_6_pack, checkout_9_pack,
              buyer_agency, marketplace, google_accounts, taboola_pixel, tiktok_pixel,
              offer_id, gdpr}')

          if [ -z "$NOTION_JSON" ]; then
            echo "❌ jq failed to build NOTION_JSON — check for invalid arg values above"
            exit 1
          fi

          echo "✅ NOTION_JSON built (${#NOTION_JSON} chars)"
          echo "notion_json=$NOTION_JSON" >> "$GITHUB_OUTPUT"
