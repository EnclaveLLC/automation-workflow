name: Workflow Commands

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      comment_body:
        required: true
        type: string
      repository:
        required: true
        type: string

jobs:
  restart:
    name: Restart Workflow
    if: contains(inputs.comment_body, '@restart')
    uses: ./.github/workflows/restart.yml
    with:
      issue_number: ${{ inputs.issue_number }}
      repository: ${{ inputs.repository }}
    secrets: inherit
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write