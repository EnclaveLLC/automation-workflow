name: New Page

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number that triggered this workflow"
        required: true
        type: number

jobs:
  # ── Job 1: Parse issue body ─────────────────────────────────────────────────
  parse-issue:
    name: Parse Issue Body
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      page_url:        ${{ steps.parse.outputs.page_url }}
      page_path:       ${{ steps.parse.outputs.page_path }}
      comment_id:      ${{ steps.progress_comment.outputs.comment_id }}
      comment_updated: ${{ steps.parse.outputs.comment_updated }}

    steps:
      - name: Comment new page creation in progress
        id: progress_comment
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            -X POST \
            -f body="<img src=\"https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/badges-loading.svg\" width=\"20\" height=\"20\" data-linear-height=\"20\"/> New page creation in progress" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Parse issue body
        id: parse
        run: |
          ISSUE_BODY=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }} --jq '.body')
          export ISSUE_BODY

          # Ignore "Dev Notes" and anything after it; stop at ] to avoid capturing link targets
          PAGE_URL=$(node -e "
            const body = process.env.ISSUE_BODY.split(/\nDev Notes/i)[0];
            const m = body.match(/https?:\/\/[^\]\s>)]+/);
            if (!m) { process.stderr.write('No URL found\n'); process.exit(1); }
            process.stdout.write(m[0]);
          " 2>/dev/null || true)

          if [ -z "$PAGE_URL" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments --jq '.[-1].id') \
              -X PATCH \
              -f body="$(printf '### New Page Creation Failed\n\nNo URL found in the issue body.\n\nPlease follow the issue format and include a valid page URL.')"
            echo "comment_updated=true" >> "$GITHUB_OUTPUT"
            echo "ERROR: No URL found in issue body"
            exit 1
          fi

          # Use Node URL API to reliably strip domain → pathname only
          PAGE_PATH=$(PAGE_URL="$PAGE_URL" node -e "
            const url = new URL(process.env.PAGE_URL);
            process.stdout.write(url.pathname.replace(/^\//, ''));
          ")

          echo "page_url=$PAGE_URL"   >> "$GITHUB_OUTPUT"
          echo "page_path=$PAGE_PATH" >> "$GITHUB_OUTPUT"
          echo "Parsed URL:  $PAGE_URL"
          echo "Parsed path: $PAGE_PATH"

  # ── Job 2: Check path does not already exist ────────────────────────────────
  check-path:
    name: Check Path Availability
    needs: parse-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN:   ${{ github.token }}
      PAGE_PATH:  ${{ needs.parse-issue.outputs.page_path }}
      COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
    outputs:
      comment_updated: ${{ steps.check_exists.outputs.comment_updated }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Check page does not already exist
        id: check_exists
        run: |
          set -euo pipefail
          CLEAN_PATH="${PAGE_PATH#/}"
          if [ -e "$CLEAN_PATH" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### New Page Creation Failed\n\nThe following path already exists in the repository:\n\n❌ %s\n\nPlease choose a different path.' "$CLEAN_PATH")"
            echo "comment_updated=true" >> "$GITHUB_OUTPUT"
            echo "ERROR: '$CLEAN_PATH' already exists."
            exit 1
          fi
          echo "✅ Path '$CLEAN_PATH' is available."

  # ── Job 3: Create new page ──────────────────────────────────────────────────
  create-page:
    name: Create New Page
    needs: [parse-issue, check-path]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      GH_TOKEN:   ${{ github.token }}
      PAGE_PATH:  ${{ needs.parse-issue.outputs.page_path }}
      PAGE_URL:   ${{ needs.parse-issue.outputs.page_url }}
      COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
    outputs:
      comment_updated: ${{ steps.verify_branch.outputs.comment_updated }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Set branch name
        run: |
          PAGE_SLUG=$(basename "${PAGE_PATH%/}")
          echo "BRANCH_NAME=new-page/${PAGE_SLUG}" >> "$GITHUB_ENV"

      - name: Check for existing branch
        id: verify_branch
        run: |
          set -euo pipefail
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "refs/heads/${BRANCH_NAME}"; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Branch '$BRANCH_NAME' already exists — task already completed, skipping."
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ Branch '$BRANCH_NAME' is available."
          fi

      - name: Create branch
        if: steps.verify_branch.outputs.already_exists != 'true'
        run: |
          set -euo pipefail
          git checkout -b "$BRANCH_NAME"

      - name: Create page folder and index.html
        if: steps.verify_branch.outputs.already_exists != 'true'
        run: |
          set -euo pipefail
          PAGE_PATH="${PAGE_PATH#/}"
          mkdir -p "$PAGE_PATH"

          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="en">' \
            '<head>' \
            '  <meta charset="UTF-8" />' \
            '  <meta name="viewport" content="width=device-width, initial-scale=1.0" />' \
            '  <meta name="robots" content="noindex, nofollow" />' \
            '  <title>New Page</title>' \
            '</head>' \
            '<body>' \
            '' \
            '</body>' \
            '</html>' \
            > "$PAGE_PATH/index.html"

          echo "✅ Created $PAGE_PATH/index.html"

      - name: Configure git identity
        if: steps.verify_branch.outputs.already_exists != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        if: steps.verify_branch.outputs.already_exists != 'true'
        run: |
          set -euo pipefail
          git add .
          git commit -m "${{ github.event.issue.title }}"

      - name: Push branch
        if: steps.verify_branch.outputs.already_exists != 'true'
        run: |
          set -euo pipefail
          git push -u origin "$BRANCH_NAME"

      - name: Comment branch link on issue
        env:
          ALREADY_EXISTS: ${{ steps.verify_branch.outputs.already_exists }}
        run: |
          set -euo pipefail
          BRANCH_URL="https://github.com/${{ github.repository }}/tree/${BRANCH_NAME}"

          if [ "$ALREADY_EXISTS" = "true" ]; then
            cat > /tmp/issue_comment.md << CMEOF
          Branch already exists. Skipping creation.

          ${BRANCH_URL}
          CMEOF
          else
            cat > /tmp/issue_comment.md << CMEOF
          ### Summary:
          - New page created
          - Branch created

          The page branch is ready. Comment \`/pr\` on this issue to generate a pull request:
          ${BRANCH_URL}
          CMEOF
          fi

          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(cat /tmp/issue_comment.md)"

  # ── Job: Update comment on any failure ─────────────────────────────────────
  handle-failure:
    name: Handle Failure
    needs: [parse-issue, check-path, create-page]
    runs-on: ubuntu-latest
    if: >-
      failure() &&
      needs.parse-issue.outputs.comment_updated != 'true' &&
      needs.check-path.outputs.comment_updated != 'true' &&
      needs.create-page.outputs.comment_updated != 'true'
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Update comment with failure message
        env:
          COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          if [ -z "$COMMENT_ID" ]; then
            echo "No comment ID available, skipping"
            exit 0
          fi
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(printf '### New Page Creation Failed\n\nAn error occurred. Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.')"
