# -----------------------------------------------------------------------------
# Workflow: Notion Parse
# Queries the fixed Notion database and exposes its pages as JSON.
# Database ID: 13179191-0c32-81c5-bd02-000bf86f5417
# -----------------------------------------------------------------------------
name: Notion Parse

on:
  workflow_call:
    inputs:
      comment_id:
        description: "Issue comment ID to update"
        required: false
        type: string
    secrets:
      NOTION_TOKEN:
        required: true
    outputs:
      notion_data:
        description: "JSON array of pages returned by the Notion database query"
        value: ${{ jobs.parse.outputs.notion_data }}

jobs:
  parse:
    name: Parse Notion Database
    runs-on: ubuntu-latest
    outputs:
      notion_data: ${{ steps.fetch.outputs.notion_data }}

    steps:
      - name: Query Notion database
        id: fetch
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          DATABASE_ID="13179191-0c32-81c5-bd02-000bf86f5417"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.notion.com/v1/databases/$DATABASE_ID/query")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Notion API returned HTTP $HTTP_CODE"
            echo "$BODY" | jq -r '.message // .' 2>/dev/null || echo "$BODY"
            exit 1
          fi

          PAGE_COUNT=$(echo "$BODY" | jq '.results | length')
          echo "✅ Fetched $PAGE_COUNT pages from Notion database"

          DELIMITER="NOTION_DATA_$(openssl rand -hex 8)"
          {
            echo "notion_data<<$DELIMITER"
            echo "$BODY" | jq -c '.results'
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"
