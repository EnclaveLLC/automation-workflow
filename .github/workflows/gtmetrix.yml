name: GT Metrix

on:
  workflow_call:
    secrets:
      GTMETRIX_API_KEY:
        required: true
    inputs:
      gtmetrix_url:
        description: 'GTmetrix URL to test'
        required: true
        type: string
      issue_url:
        description: 'Issue URL to post results to'
        required: false
        type: string
      comment_id:
        description: 'Existing issue comment ID to update with GTmetrix results'
        required: false
        type: string
      badge_completed:
        description: 'Image URL for the completed status badge'
        required: false
        type: string
      badge_aborted:
        description: 'Image URL for the aborted status badge'
        required: false
        type: string
      badge_in_progress:
        description: 'Image URL for the in-progress status badge'
        required: false
        type: string
      badge_waiting:
        description: 'Image URL for the waiting status badge'
        required: false
        type: string

jobs:
  gtmetrix:
    name: GTmetrix Check
    if: inputs.gtmetrix_url != '' && inputs.issue_url != ''
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: read
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout automation-workflow (scripts)
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: automation-workflow
          fetch-depth: 1

      - name: Extract GTmetrix Test URLs from PR body
        id: extract_url
        env:
          INPUT_GTMETRIX_URL: ${{ inputs.gtmetrix_url }}
          INPUT_ISSUE_URL: ${{ inputs.issue_url }}
        run: |
          GTMETRIX_URLS="$INPUT_GTMETRIX_URL"
          ISSUE_URL="$INPUT_ISSUE_URL"

          echo "=== FINAL: gtmetrix_urls ==="
          echo "$GTMETRIX_URLS"

          DELIMITER="GTMETRIX_URLS_$(openssl rand -hex 8)"
          {
            echo "gtmetrix_urls<<$DELIMITER"
            echo "$GTMETRIX_URLS"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

          echo "=== FINAL: issue_url ==="
          echo "${ISSUE_URL:-<none found>}"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Wait for all GTmetrix URLs to go live
        env:
          GTMETRIX_URLS: ${{ steps.extract_url.outputs.gtmetrix_urls }}
        run: |
          if [ -z "$GTMETRIX_URLS" ]; then
            echo "⚠️  No GTmetrix URLs extracted — skipping live check."
            exit 0
          fi

          check_url_live() {
            local URL="$1"
            echo "--- Polling $URL ---"
            for i in $(seq 1 30); do
              STATUS_CODE=$(node -e "
                fetch('$URL', { method: 'GET', redirect: 'follow' })
                  .then(r => { process.stdout.write(String(r.status)); process.exit(0); })
                  .catch(() => { process.stdout.write('0'); process.exit(0); });
              ")
              echo "Attempt $i: HTTP $STATUS_CODE"

              if [ "$STATUS_CODE" = "200" ]; then
                echo "✅ $URL is live."
                return 0
              fi

              if [ "$i" = "30" ]; then
                echo "⚠️  $URL did not return 200 after 30 attempts — moving on."
              fi

              sleep 20
            done
          }

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            check_url_live "$URL"
          done <<< "$GTMETRIX_URLS"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run GTmetrix tests
        if: steps.extract_url.outputs.gtmetrix_urls != ''
        id: run_tests
        env:
          GTMETRIX_API_KEY: ${{ secrets.GTMETRIX_API_KEY }}
          GTMETRIX_URLS: ${{ steps.extract_url.outputs.gtmetrix_urls }}
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ inputs.comment_id }}
          BADGE_COMPLETED: ${{ inputs.badge_completed }}
          BADGE_ABORTED: ${{ inputs.badge_aborted }}
          BADGE_IN_PROGRESS: ${{ inputs.badge_in_progress }}
          BADGE_WAITING: ${{ inputs.badge_waiting }}
        run: |
          TMPFILE=$(mktemp)
          echo "[]" > "$TMPFILE"

          NUM_RUNS=5
          COMPLETED_URLS=""
          FAILED_URLS=""
          ABORTED_URLS=""

          cat > /tmp/update_gtm_progress.js << 'SCRIPT'
          const fs = require('fs');
          let body = fs.readFileSync('/tmp/current_body.txt', 'utf8');
          const statusData = JSON.parse(fs.readFileSync('/tmp/gtm_status.json', 'utf8'));
          const badgeMap = {
            completed:   process.env.BADGE_COMPLETED,
            in_progress: process.env.BADGE_IN_PROGRESS,
            waiting:     process.env.BADGE_WAITING,
            aborted:     process.env.BADGE_ABORTED,
          };
          const completedResults = {};
          try {
            const resultsFile = process.env.RESULTS_FILE;
            if (resultsFile) {
              for (const r of JSON.parse(fs.readFileSync(resultsFile, 'utf8'))) {
                completedResults[r.url] = r;
              }
            }
          } catch {}
          const rows = statusData.map(row => {
            const badge = badgeMap[row.status] || badgeMap.waiting;
            const result = completedResults[row.url];
            if ((row.status === 'completed' || row.status === 'aborted') && result) {
              const report = result.report_url ? `[View](${result.report_url})` : '-';
              return `| ${row.url} | <img src="${badge}" width="120" data-linear-height="20"> | ${result.grade} | ${result.performance}% | ${result.structure}% | ${report} |`;
            }
            return `| ${row.url} | <img src="${badge}" width="120" data-linear-height="20"> | - | - | - | - |`;
          });
          const table = [
            '---',
            '### GTmetrix Performance Test:',
            '<!-- linear:table-colwidths:298,130,65,111,95,90 -->',
            '| URL | Status | Grade | Performance | Structure | Report |',
            '|:---|:---|:---:|:---:|:---:|:---:|',
            ...rows,
          ].join('\n');
          const abortedUrls = (process.env.ABORTED_URLS_LIST || '').split('\n').filter(Boolean);
          const abortNotes = abortedUrls.map(u =>
            `> ⚠️ **Test aborted:** ${u}\n> The test ran for over 10 minutes and was ended automatically. Please test this URL in GTmetrix manually.`
          ).join('\n\n');
          const suffix = abortNotes ? '\n\n' + abortNotes : '';
          body = body.replace(
            /(\| GT Metrix Test \| )<img[^>]+>( \|)/,
            `$1<img src="${process.env.BADGE_IN_PROGRESS}" width="120" data-linear-height="20">$2`
          );
          body = body.replace(
            /<!-- gtmetrix-details -->[\s\S]*?<!-- \/gtmetrix-details -->/,
            `<!-- gtmetrix-details -->\n${table}${suffix}\n<!-- /gtmetrix-details -->`
          );
          process.stdout.write(body);
          SCRIPT

          update_comment() {
            local CURRENT_URL="$1"
            local RUN_NUM="$2"
            [ -z "$COMMENT_ID" ] && return
            local STATUS_JSON="["
            local SEP=""
            while IFS= read -r U; do
              [ -z "$U" ] && continue
              local S
              if printf '%s' "$ABORTED_URLS" | grep -qF "$U"; then
                S="aborted"
              elif printf '%s' "$COMPLETED_URLS" | grep -qF "$U"; then
                S="completed"
              elif [ "$U" = "$CURRENT_URL" ]; then
                S="in_progress"
              else
                S="waiting"
              fi
              STATUS_JSON="${STATUS_JSON}${SEP}{\"url\":\"${U}\",\"status\":\"${S}\"}"
              SEP=","
            done <<< "$GTMETRIX_URLS"
            STATUS_JSON="${STATUS_JSON}]"
            echo "$STATUS_JSON" > /tmp/gtm_status.json
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} --jq '.body' \
              > /tmp/current_body.txt 2>/dev/null || return
            local NEW_BODY=$(ABORTED_URLS_LIST="$ABORTED_URLS" RESULTS_FILE="$TMPFILE" node /tmp/update_gtm_progress.js)
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$NEW_BODY" > /dev/null 2>&1 || true
          }

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            echo "=== Testing: $URL (${NUM_RUNS} runs) ==="

            RUNS_FILE=$(mktemp)
            echo "[]" > "$RUNS_FILE"
            URL_START=$(date +%s)
            URL_ABORTED=false

            for RUN in $(seq 1 $NUM_RUNS); do
              ELAPSED=$(( $(date +%s) - URL_START ))
              if [ "$ELAPSED" -ge 600 ]; then
                echo "⚠️ Test aborted: $URL"
                echo "The test ran for over 10 minutes and was ended automatically. Please test this URL in GTmetrix manually."
                ABORTED_URLS="${ABORTED_URLS:+$ABORTED_URLS$'\n'}$URL"
                URL_ABORTED=true
                break
              fi

              echo "--- Run $RUN / $NUM_RUNS ---"
              update_comment "$URL" "$RUN"

              GTMETRIX_EXIT=0
              timeout 600 node automation-workflow/scripts/gtmetrix/gtmetrix.js "$URL" > /tmp/gtm_out.txt 2>&1 || GTMETRIX_EXIT=$?
              OUTPUT=$(cat /tmp/gtm_out.txt)
              echo "$OUTPUT"

              if [ "$GTMETRIX_EXIT" -eq 124 ]; then
                echo "⚠️ Test aborted: $URL"
                echo "The test ran for over 10 minutes and was ended automatically. Please test this URL in GTmetrix manually."
                ABORTED_URLS="${ABORTED_URLS:+$ABORTED_URLS$'\n'}$URL"
                URL_ABORTED=true
                break
              fi

              JSON_ENTRY=$(echo "$OUTPUT" | grep '^RESULT_JSON:' | sed 's/^RESULT_JSON://')

              if [ -n "$JSON_ENTRY" ]; then
                echo "$JSON_ENTRY" > /tmp/gtmetrix_run.json

                node -e "
                  const fs = require('fs');
                  const arr = JSON.parse(fs.readFileSync('$RUNS_FILE', 'utf8'));
                  const entry = JSON.parse(fs.readFileSync('/tmp/gtmetrix_run.json', 'utf8'));
                  arr.push(entry);
                  fs.writeFileSync('$RUNS_FILE', JSON.stringify(arr, null, 2));
                "
                echo "✅ Run $RUN recorded."
              else
                echo "⚠️  Run $RUN produced no result — skipping."
              fi
            done

            if [ "$URL_ABORTED" = "true" ]; then
              PARTIAL_BEST=$(node -e "
                const fs = require('fs');
                const runs = JSON.parse(fs.readFileSync('$RUNS_FILE', 'utf8'));
                if (!runs.length) { process.stdout.write(''); process.exit(0); }
                const best = runs.reduce((a, b) =>
                  b.performance > a.performance ? b :
                  b.performance === a.performance && b.structure > a.structure ? b : a
                );
                best.selected_from = runs.length;
                best.aborted = true;
                process.stdout.write(JSON.stringify(best));
              ")
              if [ -n "$PARTIAL_BEST" ]; then
                echo "$PARTIAL_BEST" > /tmp/gtmetrix_partial_best.json
                node -e "
                  const fs = require('fs');
                  const arr = JSON.parse(fs.readFileSync('$TMPFILE', 'utf8'));
                  const entry = JSON.parse(fs.readFileSync('/tmp/gtmetrix_partial_best.json', 'utf8'));
                  arr.push(entry);
                  fs.writeFileSync('$TMPFILE', JSON.stringify(arr, null, 2));
                "
                echo "=== Partial best for $URL (aborted): $(cat /tmp/gtmetrix_partial_best.json) ==="
              fi
              update_comment "" ""
              if [ -n "$COMMENT_ID" ]; then
                gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} --jq '.body' \
                  > /tmp/current_body.txt 2>/dev/null
                ABORTED_URL="$URL" NEW_BODY=$(node -e "
                  const fs = require('fs');
                  let body = fs.readFileSync('/tmp/current_body.txt', 'utf8');
                  const url = process.env.ABORTED_URL;
                  const note = '> ⚠️ **Test aborted:** ' + url + '\n> The test ran for over 10 minutes and was ended automatically. Please test this URL in GTmetrix manually.';
                  body = body.replace(
                    /(<!-- gtmetrix-details -->[\s\S]*?)(<!-- \/gtmetrix-details -->)/,
                    (_, content, close) => content.trimEnd() + '\n\n' + note + '\n' + close
                  );
                  process.stdout.write(body);
                ")
                gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
                  -X PATCH \
                  -f body="$NEW_BODY" > /dev/null || true
              fi
              continue
            fi

            COMPLETED_URLS=$(printf '%s%s\n' "$COMPLETED_URLS" "$URL")

            BEST_ENTRY=$(node -e "
              const fs = require('fs');
              const runs = JSON.parse(fs.readFileSync('$RUNS_FILE', 'utf8'));
              if (!runs.length) { process.stdout.write(''); process.exit(0); }
              const best = runs.reduce((a, b) =>
                b.performance > a.performance ? b :
                b.performance === a.performance && b.structure > a.structure ? b : a
              );
              best.selected_from = runs.length;
              process.stdout.write(JSON.stringify(best));
            ")

            if [ -n "$BEST_ENTRY" ]; then
              echo "$BEST_ENTRY" > /tmp/gtmetrix_best.json
              node -e "
                const fs = require('fs');
                const arr = JSON.parse(fs.readFileSync('$TMPFILE', 'utf8'));
                const entry = JSON.parse(fs.readFileSync('/tmp/gtmetrix_best.json', 'utf8'));
                arr.push(entry);
                fs.writeFileSync('$TMPFILE', JSON.stringify(arr, null, 2));
              "
              echo "=== Best for $URL: $(cat /tmp/gtmetrix_best.json) ==="
              update_comment "" ""
            else
              echo "⚠️  No valid results for $URL — not saved."
              FAILED_URLS="${FAILED_URLS:+$FAILED_URLS$'\n'}$URL"
            fi

          done <<< "$GTMETRIX_URLS"

          JSON_OUTPUT=$(jq -c . "$TMPFILE")

          echo "test_results=$JSON_OUTPUT" >> "$GITHUB_OUTPUT"
          {
            echo 'failed_urls<<EOF'
            printf '%s\n' "$FAILED_URLS"
            echo EOF
          } >> "$GITHUB_OUTPUT"
          {
            echo 'aborted_urls<<EOF'
            printf '%s\n' "$ABORTED_URLS"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post GTMetrix results to GitHub Issue
        if: inputs.comment_id != '' && (steps.run_tests.outputs.test_results != '' || steps.run_tests.outputs.failed_urls != '' || steps.run_tests.outputs.aborted_urls != '')
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_RESULTS: ${{ steps.run_tests.outputs.test_results }}
          FAILED_URLS: ${{ steps.run_tests.outputs.failed_urls }}
          ABORTED_URLS: ${{ steps.run_tests.outputs.aborted_urls }}
          COMMENT_ID: ${{ inputs.comment_id }}
          BADGE_COMPLETED: ${{ inputs.badge_completed }}
          BADGE_ABORTED: ${{ inputs.badge_aborted }}
        run: |
          cat > /tmp/build_gtm_table.js << 'SCRIPT'
          const results = JSON.parse(process.env.TEST_RESULTS || '[]');
          const failedUrls = (process.env.FAILED_URLS || '').split('\n').filter(Boolean);
          const abortedUrls = (process.env.ABORTED_URLS || '').split('\n').filter(Boolean);
          const rows = [];
          const resultsByUrl = {};
          for (const r of results) {
            resultsByUrl[r.url] = r;
          }
          for (const r of results.filter(r => !r.aborted)) {
            const report = r.report_url ? `[View](${r.report_url})` : '-';
            rows.push(`| ${r.url} | <img src="${process.env.BADGE_COMPLETED}" width="120" data-linear-height="20"> | ${r.grade} | ${r.performance}% | ${r.structure}% | ${report} |`);
          }
          for (const url of abortedUrls) {
            const r = resultsByUrl[url];
            if (r) {
              const report = r.report_url ? `[View](${r.report_url})` : '-';
              rows.push(`| ${url} | <img src="${process.env.BADGE_ABORTED}" width="120" data-linear-height="20"> | ${r.grade} | ${r.performance}% | ${r.structure}% | ${report} |`);
            } else {
              rows.push(`| ${url} | <img src="${process.env.BADGE_ABORTED}" width="120" data-linear-height="20"> | - | - | - | - |`);
            }
          }
          for (const url of failedUrls) {
            rows.push(`| ${url} | <img src="${process.env.BADGE_ABORTED}" width="120" data-linear-height="20"> | - | - | - | - |`);
          }
          let output = [
            '---',
            '### GTmetrix Performance Test:',
            '<!-- linear:table-colwidths:268,130,65,111,95,90 -->',
            '| URL | Status | Grade | Performance | Structure | Report |',
            '|:---|:---|:---:|:---:|:---:|:---:|',
            ...rows,
          ].join('\n');
          if (abortedUrls.length) {
            output += '\n\n' + abortedUrls.map(u =>
              `> ⚠️ **Test aborted:** ${u}\n> The test ran for over 10 minutes and was ended automatically. Please test this URL in GTmetrix manually.`
            ).join('\n\n');
          }
          if (failedUrls.length) {
            output += '\n\n> ❌ **Failed to test** — insufficient API credits. Please test the following URLs manually:\n';
            output += failedUrls.map(u => `> - ${u}`).join('\n');
          }
          process.stdout.write(output);
          SCRIPT
          node /tmp/build_gtm_table.js > /tmp/gtm_details.txt

          if [ -n "$ABORTED_URLS" ]; then
            GTM_BADGE="aborted"
          elif [ -s /tmp/gtm_details.txt ]; then
            GTM_BADGE="completed"
          else
            GTM_BADGE="failed"
          fi

          CURRENT=$(gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} --jq '.body')
          echo "$CURRENT" > /tmp/current_body.txt

          cat > /tmp/update_gtm.js << 'SCRIPT'
          const fs = require('fs');
          let body = fs.readFileSync('/tmp/current_body.txt', 'utf8');
          const details = fs.readFileSync('/tmp/gtm_details.txt', 'utf8').trim();
          const badgeUrl = process.env.GTM_BADGE === 'completed'
            ? process.env.BADGE_COMPLETED
            : process.env.BADGE_ABORTED;

          body = body.replace(
            /(\| GT Metrix Test \| )<img[^>]+>( \|)/,
            `$1<img src="${badgeUrl}" width="120" data-linear-height="20">$2`
          );
          body = body.replace(
            /<!-- gtmetrix-details -->[\s\S]*?<!-- \/gtmetrix-details -->/,
            `<!-- gtmetrix-details -->\n${details}\n<!-- /gtmetrix-details -->`
          );
          process.stdout.write(body);
          SCRIPT

          NEW_BODY=$(GTM_BADGE="$GTM_BADGE" node /tmp/update_gtm.js)
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$NEW_BODY"

      - name: Update GTmetrix history
        if: steps.extract_url.outputs.gtmetrix_urls != ''
        env:
          TEST_RESULTS: ${{ steps.run_tests.outputs.test_results }}
        run: |
          WROTE_ENTRIES=$(node -e "
            const fs = require('fs');
            const histPath = 'reports/gtmetrix-history.json';
            fs.mkdirSync('reports', { recursive: true });
            let existing = [];
            if (fs.existsSync(histPath)) {
              try {
                const content = fs.readFileSync(histPath, 'utf8').trim();
                if (content) existing = JSON.parse(content);
              } catch {}
            }
            const newEntries = JSON.parse(process.env.TEST_RESULTS || '[]');
            if (!newEntries.length) { process.stdout.write('false'); process.exit(0); }
            fs.writeFileSync(histPath, JSON.stringify([...existing, ...newEntries], null, 2));
            process.stdout.write('true');
          ")

          if [ "$WROTE_ENTRIES" != "true" ]; then
            echo "No new GTmetrix results to commit (tests may have been aborted or failed)."
            exit 0
          fi

          git config user.name "badges-action[bot]"
          git config user.email "badges-action[bot]@users.noreply.github.com"
          git add reports/gtmetrix-history.json
          git commit -m "Update GTmetrix history"
          git pull --rebase origin ${{ github.event.pull_request.base.ref || github.ref_name }}
          git push
