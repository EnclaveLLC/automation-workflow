# -----------------------------------------------------------------------------
# Workflow: Standard Issue Label Router
# Triggers on issue label events and dispatches to the corresponding
# reusable workflow in EnclaveLLC/automation-workflow.
#
# Note: target workflows must declare `on: workflow_call` to be callable here.
# -----------------------------------------------------------------------------
name: Standard Workflow

on:
  workflow_call:
    inputs:
      label_name:
        required: true
        type: string
      issue_number:
        required: true
        type: number

jobs:

    page-duplicate:
        name: Page Duplicate
        if: inputs.label_name == 'Page Duplicate'
        uses: ./.github/workflows/page-duplicate.yml
        with:
            issue_number: ${{ inputs.issue_number }}
        secrets: inherit
        permissions:
            contents: write
            issues: write
            pull-requests: write

    new-page:
        if: inputs.label_name == 'New Page'
        uses: ./.github/workflows/new-page.yml
        with:
            issue_number: ${{ inputs.issue_number }}
        secrets: inherit
        permissions:
            contents: write
            issues: write
            pull-requests: write

    split-test-on:
        if: inputs.label_name == 'Split Test On'
        uses: ./.github/workflows/split-test.yml
        with:
            issue_number: ${{ inputs.issue_number }}
            type: "on"
        secrets: inherit
        permissions:
            contents: write
            issues: write
            pull-requests: write

    split-test-off:
        if: inputs.label_name == 'Split Test Off'
        uses: ./.github/workflows/split-test.yml
        with:
            issue_number: ${{ inputs.issue_number }}
            type: "off"
        secrets: inherit
        permissions:
            contents: write
            issues: write
            pull-requests: write
