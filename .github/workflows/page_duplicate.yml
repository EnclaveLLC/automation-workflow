name: Page Duplicate

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number that triggered this workflow"
        required: true
        type: number

jobs:
  # ── Job 1: Parse issue body ─────────────────────────────────────────────────
  parse-issue:
    name: Parse Issue Body
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      ref_path:        ${{ steps.parse.outputs.ref_path }}
      duplicate_path:  ${{ steps.parse.outputs.duplicate_path }}
      cta_links:       ${{ steps.parse.outputs.cta_links }}
      gtmetrix_urls:   ${{ steps.parse.outputs.gtmetrix_urls }}
      replace_mapping: ${{ steps.parse.outputs.replace_mapping }}
      comment_id:      ${{ steps.progress_comment.outputs.comment_id }}

    steps:
      - name: Comment page duplication in progress
        id: progress_comment
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
            -X POST \
            -f body="<img src="https://raw.githubusercontent.com/EnclaveLLC/automation-workflow/main/images/enc-loading.svg" width="20" height="20"/> Page duplication in progress" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ github.token }}

      - name: Parse issue body
        id: parse
        run: |
          ISSUE_BODY=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }} --jq '.body')
          export ISSUE_BODY
          node EnclaveLLC/automation-workflow/scripts/page_duplicate/parse-issue.js

  # ── Job 2: Verify duplicate path does not already exist ───────────────────
  check-duplicate-path:
    name: Check Duplicate Path
    needs: parse-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout and fetch latest
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Check if duplicate path already exists
        env:
          DUPLICATE_PATH: ${{ needs.parse-issue.outputs.duplicate_path }}
          COMMENT_ID:     ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          DUPLICATE_PATH="${DUPLICATE_PATH#/}"
          if [ -e "$DUPLICATE_PATH" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(printf '### Page Duplication Failed\n\nThe following path already exists in the repository:\n\n❌ %s\n\nPlease choose a different path.' "$DUPLICATE_PATH")"
            echo "Error: '$DUPLICATE_PATH' already exists."
            exit 1
          fi
          echo "✅ Path '$DUPLICATE_PATH' is available. Proceeding."

  # ── Job 3: Duplicate page and create PR ────────────────────────────────────
  page-duplicate:
    name: Initialize Page Duplicate
    needs: [parse-issue, check-duplicate-path]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      GH_TOKEN:    ${{ github.token }}
      ISSUE_TITLE: ${{ github.event.issue.title }}

    steps:

      # ── Set branch name from issue title ────────────────────────────────────
      - name: Set branch name
        run: |
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-\|-$//g')
          echo "BRANCH_NAME=${SLUG}-${{ github.run_id }}" >> "$GITHUB_ENV"

      # ── Sync with default branch ─────────────────────────────────────────────
      - name: Checkout and sync default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Pull latest changes
        run: |
          set -euo pipefail
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          echo "Default branch: $DEFAULT_BRANCH"
          git pull origin "$DEFAULT_BRANCH"

      # ── Create working branch ────────────────────────────────────────────────
      - name: Create branch
        run: |
          set -euo pipefail
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "ERROR: Branch '$BRANCH_NAME' already exists on remote." \
                 "Delete it before re-running this workflow."
            exit 1
          fi
          git checkout -b "$BRANCH_NAME"
          echo "Created branch: $BRANCH_NAME"

      # ── Checkout automation scripts ──────────────────────────────────────────
      - name: Checkout automation-workflow
        uses: actions/checkout@v4
        with:
          repository: EnclaveLLC/automation-workflow
          path: EnclaveLLC/automation-workflow
          token: ${{ github.token }}

      # ── Duplicate folder ─────────────────────────────────────────────────────
      - name: Debug paths
        run: |
          pwd
          ls -la
          ls -la pages

      - name: Duplicate folder
        id: duplicate
        env:
          REF_PATH:       ${{ needs.parse-issue.outputs.ref_path }}
          DUPLICATE_PATH: ${{ needs.parse-issue.outputs.duplicate_path }}
        run: |
          set -euo pipefail
          REF_PATH="${REF_PATH#/}"
          DUPLICATE_PATH="${DUPLICATE_PATH#/}"
          mkdir -p "$DUPLICATE_PATH"
          cp -R "$REF_PATH/." "$DUPLICATE_PATH"
          echo "duplicate_path=$DUPLICATE_PATH" >> "$GITHUB_OUTPUT"

      # ── Detect index file ────────────────────────────────────────────────────
      - name: Detect index file
        id: detect_index
        env:
          DUPLICATE_PATH: ${{ steps.duplicate.outputs.duplicate_path }}
        run: |
          set -euo pipefail
          if [ -f "$DUPLICATE_PATH/index.html" ]; then
            echo "index_file=index.html" >> "$GITHUB_OUTPUT"
            echo "Detected: index.html"
          elif [ -f "$DUPLICATE_PATH/index.php" ]; then
            echo "index_file=index.php" >> "$GITHUB_OUTPUT"
            echo "Detected: index.php"
          else
            echo "ERROR: No index.html or index.php found in $DUPLICATE_PATH"
            exit 1
          fi

      # ── Apply replacements ───────────────────────────────────────────────────
      - name: Build CTA pairs
        id: cta_pairs
        env:
          SAMCART_LINKS_FILE: constant-files/samcart-links.json
          CTA_LINKS: ${{ needs.parse-issue.outputs.cta_links }}
        run: node EnclaveLLC/automation-workflow/scripts/page_duplicate/build_cta_pairs.js

      - name: Apply replacements
        env:
          FILE_PATH:       ${{ steps.duplicate.outputs.duplicate_path }}/${{ steps.detect_index.outputs.index_file }}
          REPLACE_MAPPING: ${{ needs.parse-issue.outputs.replace_mapping }}
          CTA_PAIRS:       ${{ steps.cta_pairs.outputs.pairs }}
        run: |
          export PAIRS="${REPLACE_MAPPING}"$'\n'"${CTA_PAIRS}"
          node EnclaveLLC/automation-workflow/scripts/general/search_replace.js

      # ── Commit and push ──────────────────────────────────────────────────────
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          set -euo pipefail
          git add .
          git commit -m "${{ github.event.issue.title }}"

      - name: Push branch
        run: |
          set -euo pipefail
          git push -u origin "$BRANCH_NAME"

      # ── Create pull request ──────────────────────────────────────────────────
      - name: Create pull request
        id: create_pr
        env:
          GTMETRIX_URLS: ${{ needs.parse-issue.outputs.gtmetrix_urls }}
        run: |
          set -euo pipefail
          ISSUE_NUMBER="${{ inputs.issue_number }}"
          REPO="${{ github.repository }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          GTMETRIX_LIST=$(echo "$GTMETRIX_URLS" | sed '/./s/^/- /')

          cat > /tmp/pr_body.md << PREOF
          ### Summary:
          - Page duplicated successfully
          - Dynamic CTA replacements applied
          - PR created

          ### GTMetrix Test URLs
          ${GTMETRIX_LIST}

          ### Issue
          https://github.com/${REPO}/issues/${ISSUE_NUMBER}
          PREOF

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title --jq '.title')

          PR_URL=$(gh pr create \
            --base  "$DEFAULT_BRANCH" \
            --head  "$BRANCH_NAME" \
            --title "$ISSUE_TITLE" \
            --body-file /tmp/pr_body.md)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"

      # ── Comment on issue ─────────────────────────────────────────────────────
      - name: Comment on issue
        env:
          PR_URL:     ${{ steps.create_pr.outputs.pr_url }}
          COMMENT_ID: ${{ needs.parse-issue.outputs.comment_id }}
        run: |
          set -euo pipefail

          cat > /tmp/issue_comment.md << CMEOF
          ### Summary:
          - Page duplicated successfully
          - Dynamic CTA replacements applied
          - PR created

          The duplicated page is now available in PR to review: 
          ${PR_URL}
          CMEOF

          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
            -X PATCH \
            -f body="$(cat /tmp/issue_comment.md)"
